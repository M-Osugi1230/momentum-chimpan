market:
  include_markets:
    - Prime
    - Standard
    - Growth
  exclude_etf: true
  exclude_reit: true
  min_trading_value: 100000000
  min_price: 100

ranking:
  buy_candidate_limit: 100
  email_top_n: 10


data:
  lookback_days: 400
  history_path: data/momentum_history.csv
  ranking_history_path: data/momentum_daily_ranking.csv
  market_temperature_path: data/market_temperature.csv
  output_path: output/daily_report.xlsx
  request_timeout_seconds: 20
  progress_log_interval: 100
  error_backup_dir: data/error_backups
