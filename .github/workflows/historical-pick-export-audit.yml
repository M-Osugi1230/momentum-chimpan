name: Historical Pick Export Audit

on:
  pull_request:
    paths:
      - tools/export_full_pick_history.py
      - tools/run_full_pick_history_audit.py
      - tools/refresh_full_pick_latest_prices.py
      - tools/calculate_full_pick_adjusted_returns.py
      - .github/workflows/historical-pick-export-audit.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit dependencies
        run: python -m pip install -q --disable-pip-version-check pandas yfinance

      - name: Export every historical positive pick
        run: |
          mkdir -p output/full_pick_history
          set +e
          python tools/run_full_pick_history_audit.py \
            --output-dir output/full_pick_history \
            > output/full_pick_history/audit.log 2>&1
          status=$?
          cat output/full_pick_history/audit.log
          exit $status

      - name: Refresh latest closes for every picked stock
        run: |
          set +e
          python tools/refresh_full_pick_latest_prices.py \
            --audit-dir output/full_pick_history \
            --start 2026-07-16 \
            --end 2026-07-23 \
            > output/full_pick_history/latest_price_refresh.log 2>&1
          status=$?
          cat output/full_pick_history/latest_price_refresh.log
          exit $status

      - name: Calculate adjusted returns
        run: |
          set +e
          python tools/calculate_full_pick_adjusted_returns.py \
            --audit-dir output/full_pick_history \
            --start 2026-06-20 \
            --end 2026-07-23 \
            > output/full_pick_history/adjusted_return.log 2>&1
          status=$?
          cat output/full_pick_history/adjusted_return.log
          exit $status

      - name: Assert Daido Metal and output integrity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          base = Path('output/full_pick_history')
          data = json.loads((base / 'summary.json').read_text(encoding='utf-8'))
          latest = json.loads((base / 'latest_price_summary.json').read_text(encoding='utf-8'))
          adjusted = json.loads((base / 'adjusted_return_summary.json').read_text(encoding='utf-8'))
          assert data['daido_metal_included'] is True
          assert data['unique_picked_stocks'] > 14
          assert data['legacy_first_report_timestamp'].startswith('2026-06-23')
          assert data['included_legacy_runs'] >= 9
          assert data['included_dashboard_runs'] >= 10
          assert latest['requested_codes'] == data['unique_picked_stocks']
          assert latest['codes_with_any_recent_price'] >= int(data['unique_picked_stocks'] * 0.95)
          assert adjusted['usable_unique_stocks'] >= int(data['unique_picked_stocks'] * 0.95)
          assert data['scope']['strategy_changed'] is False
          assert data['scope']['production_state_mutated'] is False
          assert latest['strategy_changed'] is False
          assert latest['production_state_mutated'] is False
          assert adjusted['strategy_changed'] is False
          assert adjusted['production_state_mutated'] is False
          print(json.dumps({'history': data, 'latest': latest, 'adjusted': adjusted}, ensure_ascii=False, indent=2))
          PY

      - name: Upload full historical pick audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-pick-history-${{ github.run_id }}
          path: output/full_pick_history/**
          retention-days: 30
          if-no-files-found: error
