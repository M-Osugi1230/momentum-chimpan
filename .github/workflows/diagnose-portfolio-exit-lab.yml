name: Diagnose Portfolio Exit Lab

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/portfolio-exit-lab'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portfolio-exit-lab
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Apply exit policy
        run: python .github/apply_portfolio_exit_policy.py
      - name: Run isolated exit lab test
        id: exit_test
        continue-on-error: true
        run: python .github/test_portfolio_exit_lab.py > /tmp/portfolio-exit-test.log 2>&1
      - name: Upload isolated diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-exit-test-diagnostic
          path: /tmp/portfolio-exit-test.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce isolated test success
        if: steps.exit_test.outcome == 'failure'
        run: exit 1
