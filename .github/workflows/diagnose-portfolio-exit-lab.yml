name: Diagnose Portfolio Exit Lab

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/portfolio-exit-lab'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portfolio-exit-lab
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Apply exit policy
        run: python .github/apply_portfolio_exit_policy.py
      - name: Run isolated exit lab test
        run: python .github/test_portfolio_exit_lab.py
