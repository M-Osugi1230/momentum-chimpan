name: Complete Relative Strength Lifecycle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: complete-relative-strength-lifecycle-v2
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/relative-strength-lifecycle-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/relative-strength-lifecycle-v2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply lifecycle integration
        run: |
          python -m py_compile .github/apply_relative_strength_lifecycle.py
          python .github/apply_relative_strength_lifecycle.py

      - name: Validate lifecycle and governed system
        run: |
          python -m py_compile \
            main.py relative_strength_lifecycle.py \
            replay.py research_scorecard.py robustness_analysis.py \
            strategy_governance.py evidence_provenance.py operations.py state_recovery.py \
            live_execution_panel.py execution_realism.py \
            .github/validate_workflows.py .github/test_relative_strength_lifecycle.py \
            .github/test_walk_forward_replay.py .github/test_research_scorecard.py \
            .github/test_robustness_analysis.py .github/test_strategy_governance.py \
            .github/test_evidence_provenance.py .github/test_live_execution_panel.py \
            .github/test_execution_provenance.py .github/test_atomic_strategy_stamp.py \
            .github/test_state_recovery.py .github/test_operations.py \
            .github/test_historical_backfill.py .github/test_execution_realism.py
          python .github/test_relative_strength_lifecycle.py
          python .github/validate_workflows.py
          python .github/test_walk_forward_replay.py
          python .github/test_research_scorecard.py
          python .github/test_robustness_analysis.py
          python .github/test_strategy_governance.py
          python .github/test_evidence_provenance.py
          python .github/test_live_execution_panel.py
          python .github/test_execution_provenance.py
          python .github/test_atomic_strategy_stamp.py
          python .github/test_state_recovery.py
          python .github/test_operations.py
          python .github/test_historical_backfill.py
          python .github/test_execution_realism.py

      - name: Confirm strategy fingerprint is unchanged
        run: |
          mkdir -p /tmp/lifecycle-base
          git show origin/main:main.py > /tmp/lifecycle-base/main.py
          git show origin/main:config.yaml > /tmp/lifecycle-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/lifecycle-base/main.py \
            --base-config /tmp/lifecycle-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml

      - name: Publish validated non-workflow changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py relative_strength_lifecycle.py .github/test_relative_strength_lifecycle.py
          git commit -m "Add relative strength lifecycle monitoring"
          git push origin HEAD:feature/relative-strength-lifecycle-v2
