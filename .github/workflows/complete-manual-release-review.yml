name: Complete Manual Release Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: complete-manual-release-review
  cancel-in-progress: false

jobs:
  complete:
    if: github.head_ref == 'feature/manual-release-review'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/manual-release-review
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git push --force-with-lease origin HEAD:feature/manual-release-review

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi

      - name: Apply manual review workflow integration
        run: |
          if [ ! -f .github/workflows/release-review.yml ]; then
            python .github/release_review_patch.py
          else
            echo "Manual release review integration is already applied"
          fi

      - name: Validate manual review governance and unchanged strategy fingerprint
        run: |
          python -m py_compile \
            release_review.py evidence_provenance.py strategy_governance.py \
            .github/validate_workflows.py .github/test_release_review.py
          python .github/test_release_review.py
          python release_review.py validate-approvals \
            --approvals research/strategy_approvals.yaml \
            --output /tmp/approval-validation.csv
          python .github/validate_workflows.py
          mkdir -p /tmp/strategy-base
          git show origin/main:main.py > /tmp/strategy-base/main.py
          git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/strategy-base/main.py \
            --base-config /tmp/strategy-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml

      - name: Remove temporary integration machinery
        run: |
          rm -f .github/release_review_patch.py
          rm -f .github/workflows/complete-manual-release-review.yml
          git diff --check

      - name: Commit and push verified final head
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Add manual strategy release review governance"
            git fetch origin feature/manual-release-review
            git rebase origin/feature/manual-release-review
            git push origin HEAD:feature/manual-release-review
          fi

      - name: Mark ready and merge exact verified head
        run: |
          pr_number=$(gh pr list --repo "${GITHUB_REPOSITORY}" --head feature/manual-release-review --state open --json number --jq '.[0].number')
          test -n "${pr_number}"
          head_sha=$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json headRefOid --jq .headRefOid)
          gh pr ready "${pr_number}" --repo "${GITHUB_REPOSITORY}" || true
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/merge" \
            -f merge_method=merge \
            -f sha="${head_sha}"
