name: Build Paper Portfolio Risk

on:
  pull_request:
    branches:
      - feature/performance-governance

permissions:
  contents: write

jobs:
  build-and-validate:
    if: github.head_ref == 'feature/paper-portfolio-risk'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/paper-portfolio-risk
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply paper portfolio batch
        run: |
          python -m py_compile .github/paper_portfolio_patch.py
          python .github/paper_portfolio_patch.py

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Portfolio, risk, Excel, and regression tests
        run: |
          set -o pipefail
          python .github/test_paper_portfolio.py 2>&1 | tee /tmp/paper-portfolio-test.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paper-portfolio-test-log
          path: /tmp/paper-portfolio-test.log
          retention-days: 1

      - name: Clean temporary files
        run: |
          rm -f .github/paper_portfolio_patch.py
          rm -f .github/test_paper_portfolio.py
          rm -f .github/workflows/build-paper-portfolio.yml
          git diff --check

      - name: Commit final implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add paper portfolio and risk controls"
          git push origin HEAD:feature/paper-portfolio-risk
