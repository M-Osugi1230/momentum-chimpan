name: Complete Relative Strength Evidence Lab

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: complete-relative-strength-evidence-lab-v2
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/relative-strength-evidence-lab-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/relative-strength-evidence-lab-v2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Import evidence lab implementation
        run: |
          git fetch origin feature/relative-strength-evidence-lab
          git show origin/feature/relative-strength-evidence-lab:relative_strength_evidence.py > relative_strength_evidence.py
          git show origin/feature/relative-strength-evidence-lab:.github/test_relative_strength_evidence.py > .github/test_relative_strength_evidence.py

      - name: Validate evidence lab and governed system
        run: |
          python -m py_compile \
            relative_strength_evidence.py .github/test_relative_strength_evidence.py \
            main.py strategy_governance.py evidence_provenance.py state_recovery.py \
            .github/validate_workflows.py
          python .github/test_relative_strength_evidence.py
          python .github/validate_workflows.py
          python .github/test_strategy_governance.py
          python .github/test_evidence_provenance.py
          python .github/test_atomic_strategy_stamp.py
          python .github/test_state_recovery.py
          python .github/test_relative_strength_lifecycle.py

      - name: Confirm production state remains unchanged
        run: |
          git diff --exit-code -- \
            data/momentum_daily_ranking.csv \
            data/market_temperature.csv \
            data/sector_leader_signal_history.csv \
            data/paper_portfolio.csv \
            data/paper_trade_history.csv \
            data/paper_equity_history.csv \
            data/execution_audit.csv

      - name: Publish validated non-workflow files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add relative_strength_evidence.py .github/test_relative_strength_evidence.py
          git commit -m "Add governed relative strength evidence lab"
          git push origin HEAD:feature/relative-strength-evidence-lab-v2
