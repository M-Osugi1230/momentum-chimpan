name: Research Transparency Dashboard

on:
  pull_request:
    branches:
      - main
    paths:
      - research_transparency.py
      - daily_runner.py
      - research/evidence_catalog.yaml
      - research/evidence_catalog.md
      - research_evidence_catalog.py
      - .github/test_research_transparency.py
      - .github/workflows/research-transparency.yml
      - .github/workflows/daily.yml
  push:
    branches:
      - main
    paths:
      - research_transparency.py
      - daily_runner.py
      - research/evidence_catalog.yaml
      - research/evidence_catalog.md
      - research_evidence_catalog.py
      - .github/test_research_transparency.py
      - .github/workflows/research-transparency.yml
      - .github/workflows/daily.yml

permissions:
  contents: read

concurrency:
  group: research-transparency-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile transparency tools
        run: |
          python -m py_compile \
            main.py research_evidence_catalog.py \
            research_transparency.py daily_runner.py \
            .github/test_research_transparency.py
      - name: Validate transparency dashboard
        run: |
          set -o pipefail
          python .github/test_research_transparency.py \
            2>&1 | tee /tmp/research-transparency-test.log
      - name: Validate canonical evidence catalog
        run: |
          python research_evidence_catalog.py validate \
            --catalog research/evidence_catalog.yaml \
            --repository-root .
      - name: Confirm strategy files are unchanged
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          git diff --exit-code origin/main -- main.py config.yaml
      - name: Validate read-only display boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          runner = Path('daily_runner.py').read_text(encoding='utf-8')
          panel = Path('research_transparency.py').read_text(encoding='utf-8')
          workflow = Path('.github/workflows/research-transparency.yml').read_text(encoding='utf-8')
          daily = Path('.github/workflows/daily.yml').read_text(encoding='utf-8')

          assert 'main.main()' in runner
          assert 'main_module.excel_report = patched_excel' in runner
          assert 'main_module.build_plain_email = patched_plain' in runner
          assert 'main_module.build_html_email = patched_html' in runner
          assert 'write_ranking_history' not in panel
          assert 'paper_portfolio' not in panel
          assert 'score_volume_ratio' not in panel
          assert 'automatic_weight_change_allowed' in panel
          assert 'python daily_runner.py' in daily
          assert workflow.count('contents: read') >= 1
          assert ('contents:' + ' write') not in workflow
          assert ('git' + ' push') not in workflow
          PY
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: research-transparency-validation-log
          path: /tmp/research-transparency-test.log
          if-no-files-found: ignore
          retention-days: 7
