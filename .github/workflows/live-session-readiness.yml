name: Live Session Readiness

on:
  workflow_run:
    workflows:
      - Daily Momentum Report
    types:
      - completed
  pull_request:
    branches:
      - main
    paths:
      - live_session_readiness.py
      - .github/test_live_session_readiness.py
      - .github/workflows/live-session-readiness.yml
      - docs/LIVE_SESSION_READINESS.md
      - daily_runner.py
      - email_delivery.py
      - priority_outcomes.py
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile readiness tools
        run: |
          python -m py_compile \
            live_session_readiness.py \
            .github/test_live_session_readiness.py
      - name: Validate readiness contract and synthetic artifacts
        run: |
          set -o pipefail
          python .github/test_live_session_readiness.py \
            2>&1 | tee /tmp/live-session-readiness-test.log
      - name: Confirm read-only workflow boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          text = Path('.github/workflows/live-session-readiness.yml').read_text(encoding='utf-8')
          workflow = yaml.safe_load(text)
          assert workflow['permissions']['actions'] == 'read'
          assert workflow['permissions']['contents'] == 'read'
          assert ('git' + ' push') not in text
          assert ('contents:' + ' write') not in text
          assert ('EMAIL_' + 'APP_PASSWORD') not in text
          PY
      - name: Upload validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-session-readiness-validation-log
          path: /tmp/live-session-readiness-test.log
          if-no-files-found: ignore
          retention-days: 7

  inspect:
    if: github.event_name == 'workflow_run'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Download exact upstream operations artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: momentum-operations-*
          path: downloaded-daily-operations
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build signed live-session readiness report
        env:
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_EVENT: ${{ github.event.workflow_run.event }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          SOURCE_UPDATED_AT: ${{ github.event.workflow_run.updated_at }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-daily-operations output/live-session-readiness
          python live_session_readiness.py build \
            --artifact-root downloaded-daily-operations \
            --source-run-id "${SOURCE_RUN_ID}" \
            --source-run-url "${SOURCE_RUN_URL}" \
            --upstream-conclusion "${SOURCE_CONCLUSION}" \
            --upstream-event "${SOURCE_EVENT}" \
            --head-sha "${SOURCE_HEAD_SHA}" \
            --created-at-utc "${SOURCE_CREATED_AT}" \
            --updated-at-utc "${SOURCE_UPDATED_AT}" \
            --output-dir output/live-session-readiness \
            | tee /tmp/live-session-readiness-build.log
      - name: Validate signed readiness report
        if: always() && hashFiles('output/live-session-readiness/live_session_readiness.json') != ''
        run: |
          python live_session_readiness.py validate \
            --json output/live-session-readiness/live_session_readiness.json
      - name: Upload live-session readiness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-session-readiness-${{ github.event.workflow_run.id }}
          path: |
            output/live-session-readiness/live_session_readiness.json
            output/live-session-readiness/live_session_readiness.md
            /tmp/live-session-readiness-build.log
          if-no-files-found: warn
          retention-days: 90
