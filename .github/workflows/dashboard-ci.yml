name: Validate Dashboard Experience

on:
  pull_request:
    branches:
      - main
    paths:
      - email_digest.py
      - site_builder.py
      - site_experience.py
      - site_template.py
      - site_styles.py
      - site_script.py
      - daily_runner.py
      - .github/test_email_digest.py
      - .github/test_site_builder.py
      - .github/test_site_experience.py
      - .github/test_dashboard_delivery.py
      - .github/workflows/dashboard-ci.yml
      - .github/workflows/publish-dashboard.yml
      - docs/WEB_DASHBOARD.md
  push:
    branches:
      - main
    paths:
      - email_digest.py
      - site_builder.py
      - site_experience.py
      - site_template.py
      - site_styles.py
      - site_script.py
      - daily_runner.py
      - .github/test_email_digest.py
      - .github/test_site_builder.py
      - .github/test_site_experience.py
      - .github/test_dashboard_delivery.py
      - .github/workflows/dashboard-ci.yml
      - .github/workflows/publish-dashboard.yml
      - docs/WEB_DASHBOARD.md

permissions:
  contents: read

concurrency:
  group: dashboard-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile presentation tools
        run: |
          python -m py_compile \
            email_digest.py \
            site_builder.py \
            site_experience.py \
            site_template.py \
            site_styles.py \
            site_script.py \
            daily_runner.py \
            .github/test_email_digest.py \
            .github/test_site_builder.py \
            .github/test_site_experience.py \
            .github/test_dashboard_delivery.py
      - name: Validate decision-first email
        run: python .github/test_email_digest.py
      - name: Validate static dashboard data contract
        run: python .github/test_site_builder.py
      - name: Validate repeat-use dashboard experience
        run: python .github/test_site_experience.py
      - name: Validate delivery safety boundary
        run: python .github/test_dashboard_delivery.py
