name: Portfolio Regime Attribution

on:
  pull_request:
    branches:
      - main
    paths:
      - portfolio_regime_attribution.py
      - .github/test_portfolio_regime_attribution.py
      - .github/workflows/portfolio-regime-attribution.yml
      - portfolio_research.py
      - portfolio_filter_lab.py
      - historical_backfill.py
      - historical_price_panel.py
      - replay.py
      - main.py
  workflow_dispatch:
    inputs:
      max_symbols:
        description: 'Current JPX symbols; 0 means all'
        required: false
        default: '300'
        type: string
      lookback_calendar_days:
        description: 'Calendar-day price lookback'
        required: false
        default: '500'
        type: string
      sample_every:
        description: 'Ranking snapshot interval in trading days'
        required: false
        default: '5'
        type: string
  schedule:
    # Monthly, second day at 11:30 JST after the main backfill cycle.
    - cron: '30 2 2 * *'

permissions:
  contents: read

concurrency:
  group: portfolio-regime-attribution-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile attribution tools
        run: |
          python -m py_compile \
            portfolio_regime_attribution.py portfolio_research.py portfolio_filter_lab.py \
            historical_backfill.py relative_strength_lifecycle.py replay.py main.py \
            .github/test_portfolio_regime_attribution.py
      - name: Run synthetic attribution validation
        run: |
          set -o pipefail
          python .github/test_portfolio_regime_attribution.py 2>&1 | tee /tmp/portfolio-regime-attribution-test.log
      - name: Confirm read-only workflow policy
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path('.github/workflows/portfolio-regime-attribution.yml')
          text = path.read_text(encoding='utf-8')
          parsed = yaml.safe_load(text)
          assert isinstance(parsed, dict)
          assert parsed.get('permissions', {}).get('contents') == 'read'
          assert ('git' + ' push') not in text
          assert ('EMAIL_' + 'APP_PASSWORD') not in text
          for required in (
              'promotion_evidence_allowed', 'automatic_regime_filter_activation',
              'automatic_sector_exclusion', 'production_state_mutations',
              'NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN',
          ):
              assert required in text, required
          PY
      - name: Upload validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-regime-attribution-test-log
          path: /tmp/portfolio-regime-attribution-test.log
          if-no-files-found: ignore
          retention-days: 7

  analyze:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Resolve pilot or scheduled parameters
        id: parameters
        env:
          INPUT_MAX_SYMBOLS: ${{ inputs.max_symbols }}
          INPUT_LOOKBACK_DAYS: ${{ inputs.lookback_calendar_days }}
          INPUT_SAMPLE_EVERY: ${{ inputs.sample_every }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            max_symbols=72
            lookback_days=420
            sample_every=5
            batch_size=36
            run_mode=pull_request_pilot
          else
            max_symbols="${INPUT_MAX_SYMBOLS:-300}"
            lookback_days="${INPUT_LOOKBACK_DAYS:-500}"
            sample_every="${INPUT_SAMPLE_EVERY:-5}"
            batch_size=50
            run_mode=scheduled_or_manual
          fi
          echo "max_symbols=${max_symbols}" >> "${GITHUB_OUTPUT}"
          echo "lookback_days=${lookback_days}" >> "${GITHUB_OUTPUT}"
          echo "sample_every=${sample_every}" >> "${GITHUB_OUTPUT}"
          echo "batch_size=${batch_size}" >> "${GITHUB_OUTPUT}"
          echo "run_mode=${run_mode}" >> "${GITHUB_OUTPUT}"
      - name: Build isolated historical evidence
        env:
          MAX_SYMBOLS: ${{ steps.parameters.outputs.max_symbols }}
          LOOKBACK_DAYS: ${{ steps.parameters.outputs.lookback_days }}
          SAMPLE_EVERY: ${{ steps.parameters.outputs.sample_every }}
          BATCH_SIZE: ${{ steps.parameters.outputs.batch_size }}
        run: |
          mkdir -p output/attribution/replay output/attribution/report
          echo "run_mode=${{ steps.parameters.outputs.run_mode }}" > output/attribution/run-mode.txt
          set -o pipefail
          python historical_backfill.py \
            --strict \
            --max-symbols "${MAX_SYMBOLS}" \
            --lookback-calendar-days "${LOOKBACK_DAYS}" \
            --sample-every "${SAMPLE_EVERY}" \
            --batch-size "${BATCH_SIZE}" \
            --output-dir output/attribution | tee output/attribution/backfill.log
          python evidence_provenance.py seal-derived \
            --source-manifest output/attribution/backfill_manifest.json \
            --provenance output/attribution/replay/evidence_provenance.json
          python historical_price_panel.py \
            --strict \
            --history output/attribution/historical_ranking.csv \
            --backfill-manifest output/attribution/backfill_manifest.json \
            --output output/attribution/historical_price_panel.csv \
            --manifest output/attribution/historical_price_panel_manifest.json \
            --batch-size "${BATCH_SIZE}" | tee output/attribution/price-panel.log
          python replay.py \
            --strict \
            --history output/attribution/historical_ranking.csv \
            --jpx-cache data/jpx_list_cache.csv \
            --output-dir output/attribution/replay | tee output/attribution/replay.log
      - name: Attribute portfolio performance
        run: |
          set -o pipefail
          python portfolio_regime_attribution.py \
            --strict \
            --signals output/attribution/replay/replay_signals.csv \
            --history output/attribution/historical_ranking.csv \
            --prices output/attribution/historical_price_panel.csv \
            --provenance output/attribution/replay/evidence_provenance.json \
            --output-dir output/attribution/report | tee output/attribution/report/attribution.log
      - name: Validate attribution artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('output/attribution/report')
          manifest = json.loads((root / 'portfolio_regime_attribution_manifest.json').read_text(encoding='utf-8'))
          baseline = pd.read_csv(root / 'portfolio_attribution_baseline.csv')
          trade_attribution = pd.read_csv(root / 'portfolio_trade_attribution.csv')
          regime = pd.read_csv(root / 'portfolio_daily_regime_attribution.csv')
          quarterly = pd.read_csv(root / 'portfolio_quarterly_stability.csv')
          counterfactuals = pd.read_csv(root / 'portfolio_regime_sector_counterfactuals.csv')
          coverage = pd.read_csv(root / 'portfolio_attribution_context_coverage.csv')
          assert manifest['promotion_evidence_allowed'] is False
          assert manifest['automatic_regime_filter_activation'] is False
          assert manifest['automatic_sector_exclusion'] is False
          assert manifest['automatic_strategy_change'] is False
          assert manifest['production_state_mutations'] == []
          assert manifest['entry_model'] == 'NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN'
          assert not baseline.empty
          assert not trade_attribution.empty
          assert not regime.empty
          assert not quarterly.empty
          assert not counterfactuals.empty
          assert coverage.iloc[0]['relative_strength_score_coverage'] >= 0.99
          assert coverage.iloc[0]['market_regime_coverage'] >= 0.99
          assert 'baseline' in set(counterfactuals['counterfactual'])
          print(baseline[['total_return', 'max_drawdown', 'sharpe', 'benchmark_total_return', 'excess_total_return', 'closed_trades']].to_string(index=False))
          print(regime.to_string(index=False))
          print(counterfactuals[['counterfactual', 'closed_trades', 'total_return', 'max_drawdown', 'excess_total_return', 'delta_excess_return_vs_baseline', 'delta_max_drawdown_vs_baseline', 'diagnostic_status']].to_string(index=False))
          PY
      - name: Upload regime attribution evidence
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-regime-attribution-${{ github.run_id }}
          path: output/attribution/
          if-no-files-found: error
          retention-days: 30
