name: Complete Historical Relative Strength

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: complete-historical-relative-strength-v2
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/historical-relative-strength-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/historical-relative-strength-v2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply historical relative strength integration
        run: |
          python -m py_compile .github/apply_historical_relative_strength.py
          python .github/apply_historical_relative_strength.py

      - name: Run synthetic and governed-system validation
        run: |
          python -m py_compile \
            historical_backfill.py relative_strength_lifecycle.py main.py replay.py \
            portfolio_research.py strategy_governance.py evidence_provenance.py \
            .github/test_historical_relative_strength.py \
            .github/test_historical_backfill.py .github/test_portfolio_research.py \
            .github/validate_workflows.py
          python .github/test_historical_relative_strength.py
          python .github/test_historical_backfill.py
          python .github/test_portfolio_research.py
          python .github/validate_workflows.py
          python .github/test_walk_forward_replay.py
          python .github/test_strategy_governance.py
          python .github/test_evidence_provenance.py
          python .github/test_state_recovery.py

      - name: Confirm strategy fingerprint is unchanged
        run: |
          mkdir -p /tmp/strategy-base
          git show origin/main:main.py > /tmp/strategy-base/main.py
          git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/strategy-base/main.py \
            --base-config /tmp/strategy-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml

      - name: Build 36-symbol real-data reconstruction pilot
        run: |
          mkdir -p /tmp/historical-rs-pilot/replay
          set -o pipefail
          python historical_backfill.py \
            --strict \
            --max-symbols 36 \
            --lookback-calendar-days 240 \
            --sample-every 10 \
            --batch-size 36 \
            --output-dir /tmp/historical-rs-pilot | tee /tmp/historical-rs-pilot/backfill.log
          python replay.py \
            --strict \
            --history /tmp/historical-rs-pilot/historical_ranking.csv \
            --jpx-cache data/jpx_list_cache.csv \
            --output-dir /tmp/historical-rs-pilot/replay | tee /tmp/historical-rs-pilot/replay.log

      - name: Validate real-data relative strength coverage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('/tmp/historical-rs-pilot')
          history = pd.read_csv(root / 'historical_ranking.csv', dtype={'code': str})
          signals = pd.read_csv(root / 'replay/replay_signals.csv', dtype={'code': str})
          manifest = json.loads((root / 'backfill_manifest.json').read_text(encoding='utf-8'))
          score = pd.to_numeric(history['relative_strength_score'], errors='coerce')
          lifecycle = history['relative_strength_lifecycle'].fillna('').astype(str).str.strip()
          assert score.notna().all()
          assert pd.to_numeric(history['relative_strength_rank'], errors='coerce').notna().all()
          assert history['relative_strength_grade'].fillna('').ne('').all()
          assert history['relative_strength_grade'].nunique() >= 3
          assert lifecycle.ne('').all()
          assert (lifecycle != '初登場').any()
          assert history['dual_outperformer'].fillna(False).astype(bool).any()
          assert manifest['relative_strength_non_null_ratio'] == 1.0
          assert manifest['relative_strength_lifecycle_non_null_ratio'] == 1.0
          assert manifest['promotion_evidence_allowed'] is False
          assert not signals.empty
          assert pd.to_numeric(signals['relative_strength_score'], errors='coerce').notna().all()
          assert signals['relative_strength_grade'].fillna('').ne('').all()
          print(history.groupby('relative_strength_grade').size().to_string())
          print(lifecycle.value_counts().head(10).to_string())
          PY

      - name: Upload reconstruction evidence
        uses: actions/upload-artifact@v4
        with:
          name: historical-relative-strength-pilot-${{ github.run_id }}
          path: /tmp/historical-rs-pilot/
          if-no-files-found: error
          retention-days: 30

      - name: Publish validated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add historical_backfill.py
          git commit -m "Reconstruct historical relative strength lifecycle"
          git push origin HEAD:feature/historical-relative-strength-v2
