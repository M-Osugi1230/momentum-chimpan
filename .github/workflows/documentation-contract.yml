name: Documentation Contract

on:
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - docs/**
      - config.yaml
      - research/evidence_catalog.yaml
      - research/volume_component_forward_evidence.yaml
      - data/volume_component_forward_status.json
      - .github/test_documentation_contract.py
      - .github/workflows/documentation-contract.yml
      - .github/workflows/daily.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - docs/**
      - config.yaml
      - research/evidence_catalog.yaml
      - research/volume_component_forward_evidence.yaml
      - data/volume_component_forward_status.json
      - .github/test_documentation_contract.py
      - .github/workflows/documentation-contract.yml
      - .github/workflows/daily.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install YAML dependency
        run: python -m pip install PyYAML
      - name: Compile documentation contract
        run: python -m py_compile .github/test_documentation_contract.py
      - name: Validate documentation against production sources
        run: |
          set -o pipefail
          python .github/test_documentation_contract.py \
            2>&1 | tee /tmp/documentation-contract.log
      - name: Confirm read-only workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path('.github/workflows/documentation-contract.yml')
          text = path.read_text(encoding='utf-8')
          workflow = yaml.safe_load(text)
          assert workflow['permissions']['contents'] == 'read'
          assert ('git' + ' push') not in text
          assert ('contents:' + ' write') not in text
          assert ('EMAIL_' + 'APP_PASSWORD') not in text
          PY
      - name: Upload documentation contract failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-contract-failure
          path: /tmp/documentation-contract.log
          if-no-files-found: warn
          retention-days: 7
