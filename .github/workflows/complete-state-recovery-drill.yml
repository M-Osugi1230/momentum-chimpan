name: Complete State Recovery Drill

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: complete-state-recovery-drill
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/state-recovery-drill'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/state-recovery-drill
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase working tree onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply and validate state recovery
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          {
            if ! grep -q 'state_recovery.py seal' .github/workflows/daily.yml; then
              python -m py_compile .github/state_recovery_patch.py
              python .github/state_recovery_patch.py
            fi
            python -m py_compile \
              state_recovery.py main.py evidence_provenance.py operations.py \
              .github/validate_workflows.py .github/test_state_recovery.py \
              .github/test_atomic_strategy_stamp.py .github/test_operations.py
            python .github/validate_workflows.py
            python .github/test_state_recovery.py
            python .github/test_atomic_strategy_stamp.py
            python .github/test_operations.py
            git diff --check
          } 2>&1 | tee /tmp/state-recovery-validation.log

      - name: Upload recovery diagnostics
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: state-recovery-validation-log
          path: /tmp/state-recovery-validation.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce validation success
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Publish validated non-workflow changes
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/validate_workflows.py
          if ! git diff --cached --quiet; then
            git commit -m "Validate sealed state recovery workflows"
            git push --force-with-lease origin HEAD:feature/state-recovery-drill
          fi

      - name: Upload validated final tree
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-recovery-final-tree
          path: /tmp/state-recovery-final-tree.tar.gz
          if-no-files-found: ignore
          retention-days: 1
