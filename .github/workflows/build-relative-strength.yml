name: Build Relative Strength Alpha

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-validate:
    if: github.head_ref == 'feature/relative-strength-alpha'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/relative-strength-alpha
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Normalize patch quoting
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/relative_strength_patch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("relative_block = r'''", 'relative_block = r"""', 1)
          marker = "\n'''\nreplace_once(\"\\n\\ndef score"
          if marker not in text:
              raise SystemExit('relative block closing marker not found')
          text = text.replace(marker, "\n\"\"\"\nreplace_once(\"\\n\\ndef score", 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply relative strength batch
        run: |
          set -o pipefail
          python -m py_compile .github/relative_strength_patch.py 2>&1 | tee /tmp/relative-strength-patch.log
          python .github/relative_strength_patch.py 2>&1 | tee -a /tmp/relative-strength-patch.log

      - name: Compile application
        run: python -m py_compile main.py

      - name: Validate relative strength and alpha outcomes
        run: |
          set -o pipefail
          python .github/test_relative_strength.py 2>&1 | tee /tmp/relative-strength-test.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: relative-strength-test-log
          path: |
            /tmp/relative-strength-patch.log
            /tmp/relative-strength-test.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Clean temporary implementation files
        run: |
          rm -f .github/relative_strength_patch.py
          rm -f .github/test_relative_strength.py
          rm -f .github/workflows/build-relative-strength.yml
          git diff --check

      - name: Commit final implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add market and sector relative strength analytics"
          git push origin HEAD:feature/relative-strength-alpha
