name: Complete Atomic Strategy Stamping

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: complete-atomic-strategy-stamping
  cancel-in-progress: false

jobs:
  complete:
    if: github.head_ref == 'feature/atomic-strategy-stamping'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atomic-strategy-stamping
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git push --force-with-lease origin HEAD:feature/atomic-strategy-stamping

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply atomic stamping patch
        run: |
          if ! grep -q '^def attach_strategy_provenance' main.py; then
            python .github/atomic_strategy_stamp_patch.py
          else
            echo "Atomic strategy stamping is already applied"
          fi

      - name: Validate atomic state and unchanged strategy fingerprint
        run: |
          python -m py_compile \
            main.py evidence_provenance.py strategy_governance.py operations.py \
            .github/validate_workflows.py .github/test_atomic_strategy_stamp.py \
            .github/test_evidence_provenance.py .github/test_strategy_governance.py \
            .github/test_operations.py
          python .github/validate_workflows.py
          python .github/test_atomic_strategy_stamp.py
          python .github/test_evidence_provenance.py
          python .github/test_strategy_governance.py
          python .github/test_operations.py
          mkdir -p /tmp/strategy-base
          git show origin/main:main.py > /tmp/strategy-base/main.py
          git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/strategy-base/main.py \
            --base-config /tmp/strategy-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml

      - name: Remove temporary implementation machinery
        run: |
          rm -f .github/atomic_strategy_stamp_patch.py
          rm -f .github/workflows/complete-atomic-strategy-stamping.yml
          git diff --check

      - name: Commit and push verified final head
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Stamp strategy provenance before state snapshots"
            git fetch origin feature/atomic-strategy-stamping
            git rebase origin/feature/atomic-strategy-stamping
            git push origin HEAD:feature/atomic-strategy-stamping
          fi

      - name: Mark ready and merge exact verified head
        run: |
          pr_number=$(gh pr list --repo "${GITHUB_REPOSITORY}" --head feature/atomic-strategy-stamping --state open --json number --jq '.[0].number')
          test -n "${pr_number}"
          head_sha=$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json headRefOid --jq .headRefOid)
          gh pr ready "${pr_number}" --repo "${GITHUB_REPOSITORY}" || true
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/merge" \
            -f merge_method=merge \
            -f sha="${head_sha}"
