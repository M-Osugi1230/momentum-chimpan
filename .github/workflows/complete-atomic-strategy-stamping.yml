name: Complete Atomic Strategy Stamping

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: complete-atomic-strategy-stamping
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/atomic-strategy-stamping'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atomic-strategy-stamping
          fetch-depth: 0

      - name: Rebase working tree onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply and validate atomic stamping
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          {
            if ! grep -q '^def attach_strategy_provenance' main.py; then
              python -m py_compile .github/atomic_strategy_stamp_patch.py
              python .github/atomic_strategy_stamp_patch.py
            fi
            python -m py_compile \
              main.py evidence_provenance.py strategy_governance.py operations.py \
              .github/validate_workflows.py .github/test_atomic_strategy_stamp.py \
              .github/test_evidence_provenance.py .github/test_strategy_governance.py \
              .github/test_operations.py
            python .github/validate_workflows.py
            python .github/test_atomic_strategy_stamp.py
            python .github/test_evidence_provenance.py
            python .github/test_strategy_governance.py
            python .github/test_operations.py
            mkdir -p /tmp/strategy-base
            git show origin/main:main.py > /tmp/strategy-base/main.py
            git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
            python strategy_governance.py ci-check \
              --base-main /tmp/strategy-base/main.py \
              --base-config /tmp/strategy-base/config.yaml \
              --current-main main.py \
              --current-config config.yaml \
              --registry research/experiment_registry.yaml
            rm -f .github/atomic_strategy_stamp_patch.py
            rm -f .github/workflows/complete-atomic-strategy-stamping.yml
            git diff --check
            tar --exclude=.git --exclude=output --exclude='*.pyc' --exclude=__pycache__ \
              -czf /tmp/atomic-strategy-final-tree.tar.gz .
          } 2>&1 | tee /tmp/atomic-strategy-validation.log

      - name: Upload atomic stamping diagnostics
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: atomic-strategy-validation-log
          path: /tmp/atomic-strategy-validation.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce validation success
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Upload validated final tree
        if: steps.validate.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: atomic-strategy-final-tree
          path: /tmp/atomic-strategy-final-tree.tar.gz
          if-no-files-found: error
          retention-days: 1
