name: Build Sector Momentum

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/sector-momentum
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl yfinance pyyaml python-dotenv

      - name: Apply implementation
        run: python .github/sector_momentum_patch.py

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Synthetic sector momentum tests
        run: |
          python - <<'PY'
          import tempfile
          from pathlib import Path
          import pandas as pd
          import openpyxl
          import main

          today = "2026-07-11"
          previous_day = "2026-07-10"

          def stock(code, name, sector, rank, score, r20, r60, volume, ma20, ma60, ytd, date=today):
              return {
                  "date": date,
                  "code": code,
                  "name": name,
                  "sector33": sector,
                  "rank": rank,
                  "score": score,
                  "return_20d": r20,
                  "return_60d": r60,
                  "volume_ratio": volume,
                  "above_ma20": ma20,
                  "above_ma60": ma60,
                  "ytd_high_flag": ytd,
                  "close": 1000,
              }

          current = pd.DataFrame([
              stock("1111", "非鉄A", "非鉄金属", 1, 90, 0.25, 0.40, 3.2, True, True, True),
              stock("1112", "非鉄B", "非鉄金属", 8, 82, 0.18, 0.30, 2.5, True, True, True),
              stock("1113", "非鉄C", "非鉄金属", 45, 70, 0.12, 0.20, 1.8, True, True, False),
              stock("1114", "非鉄D", "非鉄金属", 120, 55, 0.08, 0.10, 1.4, True, False, False),
              stock("2221", "銀行A", "銀行業", 40, 50, 0.02, 0.03, 1.1, True, False, False),
              stock("2222", "銀行B", "銀行業", 130, 30, -0.03, -0.05, 0.8, False, False, False),
              stock("2223", "銀行C", "銀行業", 160, 25, -0.06, -0.10, 0.7, False, False, False),
              stock("9999", "分類なし", "", 5, 99, 0.50, 0.60, 5.0, True, True, True),
          ])

          previous = pd.DataFrame([
              stock("1111", "非鉄A", "非鉄金属", 80, 45, 0.01, 0.02, 1.0, True, False, False, previous_day),
              stock("1112", "非鉄B", "非鉄金属", 140, 30, -0.02, -0.03, 0.8, False, False, False, previous_day),
              stock("2221", "銀行A", "銀行業", 2, 88, 0.20, 0.25, 2.8, True, True, True, previous_day),
              stock("2222", "銀行B", "銀行業", 12, 80, 0.15, 0.18, 2.0, True, True, True, previous_day),
              stock("2223", "銀行C", "銀行業", 70, 65, 0.08, 0.10, 1.5, True, True, False, previous_day),
          ])

          sector = main.calculate_sector_momentum(current, previous, today, 100)
          assert list(sector["sector33"]) == ["非鉄金属", "銀行業"], sector
          assert sector.iloc[0]["sector_strength"] in {"強い", "やや強い"}, sector.iloc[0].to_dict()
          assert float(sector.iloc[0]["sector_momentum_score"]) > float(sector.iloc[1]["sector_momentum_score"])
          assert int(sector.iloc[0]["top100_count"]) == 3
          assert "1111 非鉄A (#1)" in sector.iloc[0]["representative_stocks"]
          assert sector.iloc[0]["previous_date"] == previous_day
          assert int(sector.iloc[0]["sector_rank_change"]) > 0
          assert "" not in set(sector["sector33"])

          score = main.sector_momentum_score_values(80, 0.20, 0.90, 0.80, 0.30, 0.25)
          assert score >= 75, score
          assert main.sector_strength_label(score) == "強い"

          plain_sector = "\n".join(main.plain_sector_momentum_section(sector))
          html_sector = main.html_sector_momentum_section(sector)
          assert "業種別モメンタム（33業種）" in plain_sector
          assert "非鉄金属" in plain_sector and "上位銘柄" in plain_sector
          assert "業種別モメンタム（33業種）" in html_sector
          assert "非鉄金属" in html_sector

          empty = pd.DataFrame()
          priority_changes = {
              "current": empty,
              "action_priority": empty,
              "new": empty,
              "continued": empty,
              "dropped": empty,
              "label_changed": empty,
              "previous_date": "",
          }
          summary = {
              "実行日": today,
              "新規ランクイン": 0,
              "急上昇": 0,
              "TOP30継続10日以上": 0,
              "年初来高値更新": 0,
              "取得失敗": 0,
              "_signal_performance": empty,
          }
          cfg = {"ranking": {"email_top_n": 10}}
          plain_email = main.build_plain_email(summary, empty, empty, empty, empty, empty, empty, sector, priority_changes, cfg)
          html_email = main.build_html_email(summary, empty, empty, empty, empty, empty, empty, sector, priority_changes, cfg)
          assert "業種別モメンタム（33業種）" in plain_email
          assert "業種別モメンタム（33業種）" in html_email

          action_row = pd.Series({
              "expectancy_score": 82,
              "expectancy_evidence_count": 25,
              "expectancy_confidence": "高",
              "score": 88,
              "rank": 5,
              "trading_value": 8_000_000_000,
              "volume_ratio": 3.2,
              "ma20_deviation": 0.10,
              "priority_labels": ["継続", "大型資金"],
              "priority_lifecycle_status": "長期定着",
              "priority_streak_days": 12,
          })
          assert main.action_priority_values(action_row, {"label": "強気"})["action_priority"] == "A"

          with tempfile.TemporaryDirectory() as tmp:
              report = Path(tmp) / "report.xlsx"
              main.excel_report(
                  path=str(report),
                  summary={
                      "業種集計数": len(sector),
                      "強い業種数": int((sector["sector_strength"] == "強い").sum()),
                      "最上位業種": sector.iloc[0]["sector33"],
                  },
                  top100=current.head(2),
                  sector_momentum=sector,
                  new_entries=empty,
                  rising_fast=empty,
                  top30_streak=empty,
                  ytd_high_ranking=empty,
                  priority_changes=empty,
                  priority_lifecycle=empty,
                  priority_expectancy=empty,
                  action_priority=empty,
                  priority_performance=empty,
                  signal_performance=empty,
                  temperature=empty,
                  errors=[],
                  universe=empty,
              )
              wb = openpyxl.load_workbook(report)
              assert "Sector Momentum" in wb.sheetnames
              assert "Action Priority" in wb.sheetnames
              headers = [cell.value for cell in wb["Sector Momentum"][1]]
              required = {
                  "sector_rank", "sector33", "sector_momentum_score", "sector_strength",
                  "stock_count", "top100_count", "avg_return_20d", "above_ma20_ratio",
                  "representative_stocks", "sector_rank_change", "sector_score_delta",
              }
              assert required.issubset(set(headers)), required - set(headers)

          assert "sector33" in main.ranking_history_columns()
          assert main.Stock("1234", "会社", "Prime", "機械").sector33 == "機械"
          print("Sector momentum, history comparison, email, Excel, and regression tests passed")
          PY

      - name: Clean temporary files
        run: |
          rm -f .github/sector_momentum_patch.py
          rm -f .github/workflows/sector-momentum-build.yml
          git status --short

      - name: Commit final implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add 33-sector momentum ranking"
          git push origin HEAD:feature/sector-momentum
