name: Build Live Execution Evidence

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: export-live-execution-evidence
  cancel-in-progress: true

jobs:
  build-and-validate:
    if: github.head_ref == 'feature/live-execution-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/live-execution-evidence
          fetch-depth: 0

      - name: Rebase working tree onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build and validate final tree
        run: bash .github/finalize_live_execution_evidence.sh

      - name: Upload verified final tree
        uses: actions/upload-artifact@v4
        with:
          name: live-execution-final-tree
          path: /tmp/live-execution-final-tree.tar.gz
          if-no-files-found: error
          retention-days: 1
