name: Build Live Execution Evidence

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: export-live-execution-evidence
  cancel-in-progress: true

jobs:
  build-and-validate:
    if: github.head_ref == 'feature/live-execution-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/live-execution-evidence
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase working tree onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build and validate final tree
        run: bash .github/finalize_live_execution_evidence.sh

      - name: Publish validated non-workflow changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            evidence_provenance.py \
            execution_realism.py \
            research/experiment_registry.yaml \
            .github/validate_workflows.py \
            .github/test_execution_provenance.py \
            live_execution_panel.py \
            .github/test_live_execution_panel.py
          if ! git diff --cached --quiet; then
            git commit -m "Require governed next-session execution evidence"
            git push --force-with-lease origin HEAD:feature/live-execution-evidence
          fi

      - name: Upload verified final tree
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-execution-final-tree
          path: /tmp/live-execution-final-tree.tar.gz
          if-no-files-found: error
          retention-days: 1
