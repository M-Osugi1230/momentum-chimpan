name: Data Quality Grades

on:
  pull_request:
    branches:
      - main
    paths:
      - data_quality.py
      - daily_runner.py
      - research/data_quality_policy.yaml
      - .github/test_data_quality.py
      - .github/workflows/data-quality.yml
      - docs/DATA_QUALITY.md
      - docs/DATA_DICTIONARY.md
      - docs/KPI_DICTIONARY.md
      - README.md
  push:
    branches:
      - main
    paths:
      - data_quality.py
      - daily_runner.py
      - research/data_quality_policy.yaml
      - .github/test_data_quality.py
      - .github/workflows/data-quality.yml
      - docs/DATA_QUALITY.md
      - docs/DATA_DICTIONARY.md
      - docs/KPI_DICTIONARY.md
      - README.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile quality tools
        run: |
          python -m py_compile \
            data_quality.py \
            daily_runner.py \
            .github/test_data_quality.py
      - name: Validate grading and priority boundary
        run: |
          set -o pipefail
          python .github/test_data_quality.py \
            2>&1 | tee /tmp/data-quality-test.log
      - name: Validate machine-readable policy
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          policy = yaml.safe_load(
              Path('research/data_quality_policy.yaml').read_text(encoding='utf-8')
          )
          assert policy['policy']['id'] == 'daily-ranking-data-quality-v1'
          assert policy['priority_boundary']['preserve_momentum_score'] is True
          assert policy['priority_boundary']['preserve_momentum_rank'] is True
          assert policy['priority_boundary']['grade_C_max_priority'] == 'B'
          assert policy['priority_boundary']['grade_D_forced_priority'] == '見送り'
          governance = policy['governance']
          assert governance['display_and_research_priority_only'] is True
          assert governance['automatic_score_change'] is False
          assert governance['automatic_weight_change'] is False
          assert governance['automatic_strategy_change'] is False
          assert governance['production_state_mutations'] == []
          assert governance['live_orders'] is False
          document = Path('docs/DATA_QUALITY.md').read_text(encoding='utf-8')
          assert 'Momentum score or rank' in document
          assert 'quality C' in document
          assert 'quality D' in document
          PY
      - name: Run limited external-data integration
        env:
          MOMENTUM_MAX_SYMBOLS: '3'
          EMAIL_FROM: ''
          EMAIL_TO: ''
          EMAIL_APP_PASSWORD: ''
        run: |
          mkdir -p output
          set -o pipefail
          python daily_runner.py \
            2>&1 | tee /tmp/data-quality-integration.log
      - name: Validate integrated workbook and priority gate
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          from openpyxl import load_workbook

          report = Path('output/daily_report.xlsx')
          assert report.is_file()
          workbook = load_workbook(report, data_only=True)
          assert 'Summary' in workbook.sheetnames
          assert 'Momentum Top100' in workbook.sheetnames
          assert 'Action Priority' in workbook.sheetnames
          assert 'Data Quality' in workbook.sheetnames
          summary = pd.read_excel(report, sheet_name='Summary')
          for column in (
              'Data Quality評価件数',
              'Data Quality A',
              'Data Quality B',
              'Data Quality C',
              'Data Quality D',
              'Data Quality優先度調整数',
              '品質C/DのA候補',
          ):
              assert column in summary.columns, column
          assert int(summary.iloc[0]['品質C/DのA候補']) == 0
          top100 = pd.read_excel(report, sheet_name='Momentum Top100')
          if not top100.empty:
              for column in (
                  'data_quality_grade',
                  'data_quality_score',
                  'data_quality_eligible_for_a',
                  'data_quality_reason_codes',
                  'data_quality_warnings',
              ):
                  assert column in top100.columns, column
              assert set(top100['data_quality_grade'].dropna()).issubset({'A', 'B', 'C', 'D'})
          priority = pd.read_excel(report, sheet_name='Action Priority')
          if not priority.empty:
              for column in (
                  'action_priority_before_quality',
                  'quality_adjustment_reason',
                  'data_quality_grade',
              ):
                  assert column in priority.columns, column
              blocked = priority[
                  priority['action_priority'].eq('A')
                  & priority['data_quality_grade'].isin(['C', 'D'])
              ]
              assert blocked.empty
          PY
      - name: Confirm strategy files are unchanged
        run: |
          git diff --exit-code -- \
            main.py \
            config.yaml \
            research/evidence_catalog.yaml \
            research/volume_component_forward_evidence.yaml
      - name: Validate read-only workflow boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path('.github/workflows/data-quality.yml')
          text = path.read_text(encoding='utf-8')
          workflow = yaml.safe_load(text)
          assert workflow['permissions']['contents'] == 'read'
          assert ('git' + ' push') not in text
          assert ('contents:' + ' write') not in text
          assert 'automatic_score_change' in text
          assert 'automatic_weight_change' in text
          assert 'automatic_strategy_change' in text
          PY
      - name: Upload data quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-diagnostics-${{ github.run_id }}
          path: |
            /tmp/data-quality-test.log
            /tmp/data-quality-integration.log
            output/daily_report.xlsx
          if-no-files-found: warn
          retention-days: 14
