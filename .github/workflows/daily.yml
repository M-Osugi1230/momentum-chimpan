name: Daily Momentum Report

on:
  schedule:
    # 16:45 JST = 07:45 UTC, Monday-Friday.
    - cron: '45 7 * * 1-5'
  workflow_dispatch:
    inputs:
      max_symbols:
        description: 'Verification only: limit scanned symbols. Use 0 for a full production run.'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: daily-momentum-report-main
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo
  PYTHONUNBUFFERED: '1'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out main with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run report
        id: report
        continue-on-error: true
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          MOMENTUM_MAX_SYMBOLS: ${{ inputs.max_symbols || '0' }}
        run: |
          mkdir -p output
          set -o pipefail
          python main.py 2>&1 | tee output/run.log

      - name: Upload report and operational state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: momentum-operations-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            output/daily_report.xlsx
            output/run.log
            data/momentum_daily_ranking.csv
            data/market_temperature.csv
            data/sector_leader_signal_history.csv
            data/paper_portfolio.csv
            data/paper_trade_history.csv
            data/paper_equity_history.csv
            data/execution_audit.csv
            data/state_snapshots/**

      - name: Persist complete production state
        if: >-
          steps.report.outcome == 'success' &&
          (github.event_name == 'schedule' || inputs.max_symbols == '0' || inputs.max_symbols == '')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- \
            data/momentum_daily_ranking.csv \
            data/market_temperature.csv \
            data/sector_leader_signal_history.csv \
            data/paper_portfolio.csv \
            data/paper_trade_history.csv \
            data/paper_equity_history.csv \
            data/execution_audit.csv \
            data/state_snapshots \
            data/jpx_list_cache.csv

          if git diff --cached --quiet; then
            echo "No production state changes to commit"
            exit 0
          fi

          git commit -m "Update complete daily momentum state"
          git fetch origin main
          git rebase origin/main

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed"
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 10))
              git fetch origin main
              git rebase origin/main
            fi
          done

          echo "Failed to persist production state after three attempts" >&2
          exit 1

      - name: Fail workflow when report generation failed
        if: steps.report.outcome == 'failure'
        run: |
          echo "main.py failed. Review the momentum-operations artifact and output/run.log." >&2
          exit 1
