name: Build Performance Governance

on:
  pull_request:
    branches:
      - feature/sector-leader-rotation

permissions:
  contents: write

jobs:
  build-and-validate:
    if: github.head_ref == 'feature/performance-governance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/performance-governance
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare and apply development batch
        run: |
          python .github/fix_performance_patch.py
          python .github/fix_performance_test.py
          python -m py_compile .github/performance_governance_patch.py
          python .github/performance_governance_patch.py

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Performance, governance, Excel, and regression tests
        run: python .github/test_performance_governance.py

      - name: Clean temporary files
        run: |
          rm -f .github/performance_governance_patch.py
          rm -f .github/fix_performance_patch.py
          rm -f .github/fix_performance_test.py
          rm -f .github/test_performance_governance.py
          rm -f .github/workflows/build-performance-governance.yml
          git diff --check
          changed="$(git diff --name-only)"
          test "$changed" = "main.py"

      - name: Commit final implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py .github
          git commit -m "Add performance governance and quality gates"
          git push origin HEAD:feature/performance-governance
