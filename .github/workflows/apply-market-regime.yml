name: Apply Market Regime patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/market-regime'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply focused patch
        run: python scripts/apply_market_regime.py
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Market Regime smoke test
        run: |
          python - <<'PY'
          import pandas as pd
          from main import calculate_market_regime, build_plain_email, build_html_email

          def make_top100(avg_return=0.18, avg_volume=2.2, ma_ratio=0.9, overheated=0):
              rows = []
              for rank in range(1, 101):
                  hot = rank <= overheated
                  above = rank <= int(100 * ma_ratio)
                  rows.append({
                      'rank': rank,
                      'code': f'{1000 + rank}',
                      'name': f'Test{rank}',
                      'score': 76,
                      'close': 1000 + rank,
                      'return_5d': 0.05,
                      'return_20d': 0.60 if hot else avg_return,
                      'return_60d': 0.30,
                      'volume_ratio': 9.0 if hot else avg_volume,
                      'trading_value': 8_000_000_000,
                      'ytd_high_count': 10,
                      'ytd_high_streak': 3,
                      'score_ytd_high': 30,
                      'score_ytd_streak': 12,
                      'score_return_20d': 15,
                      'score_volume_ratio': 10,
                      'score_ma': 10,
                      'score_trading_value': 5,
                      'reason': '年初来高値更新、20日線上、60日線上、売買代金1億円以上',
                      'is_new_entry': False,
                      'is_rising_fast': False,
                      'is_best_rank': rank <= 5,
                      'rank_change': 0,
                      'top30_streak': 4 if rank <= 30 else 0,
                      'top30_streak_days': 4 if rank <= 30 else 0,
                      'price_date': '2026-07-10',
                      'ytd_high_flag': True,
                      'ma20_deviation': 0.30 if hot else 0.10,
                      'above_ma20': above,
                      'above_ma60': above,
                  })
              return pd.DataFrame(rows)

          def temperature(avg_score, avg_return, avg_volume, ytd_count):
              return pd.DataFrame([{
                  'ytd_high_count': ytd_count,
                  'delta_ytd_high_count': 5,
                  'top100_avg_score': avg_score,
                  'delta_top100_avg_score': 1.0,
                  'top100_avg_return_20d': avg_return,
                  'delta_top100_avg_return_20d': 0.01,
                  'top100_avg_volume_ratio': avg_volume,
                  'delta_top100_avg_volume_ratio': 0.1,
              }])

          strong_df = make_top100()
          strong_temp = temperature(76, 0.18, 2.2, 120)
          strong = calculate_market_regime(strong_df, strong_temp)
          assert strong['label'] == '強気', strong
          assert strong['score'] >= 75, strong

          hot_df = make_top100(avg_return=0.28, avg_volume=2.5, ma_ratio=0.92, overheated=25)
          hot_temp = temperature(78, 0.28, 2.5, 140)
          hot = calculate_market_regime(hot_df, hot_temp)
          assert hot['label'] == '過熱警戒', hot
          assert hot['overheat_count'] == 25, hot

          weak_df = make_top100(avg_return=-0.05, avg_volume=0.8, ma_ratio=0.3)
          weak_df['score'] = 40
          weak_temp = temperature(40, -0.05, 0.8, 10)
          weak = calculate_market_regime(weak_df, weak_temp)
          assert weak['label'] == '弱気', weak

          empty = strong_df.iloc[0:0].copy()
          summary = {
              '実行日': '2026-07-10',
              '新規ランクイン': 0,
              '急上昇': 0,
              'TOP30継続10日以上': 0,
              '年初来高値更新': 120,
              '取得失敗': 0,
          }
          cfg = {'ranking': {'email_top_n': 10}}
          plain = build_plain_email(summary, strong_df, empty, empty, strong_df.head(30), strong_df.head(10), strong_temp, cfg)
          html = build_html_email(summary, strong_df, empty, empty, strong_df.head(30), strong_df.head(10), strong_temp, cfg)
          assert '【Market Regime】' in plain
          assert '判定: 強気' in plain
          assert 'MARKET REGIME' in html
          assert '本日の方針' in html
          assert 'Momentum 11-30（コンパクト）' in plain
          print('market regime smoke ok')
          PY
      - name: Commit main.py when changed
        run: |
          if git diff --quiet -- main.py; then
            echo "main.py already updated"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py
          git commit -m "Add Market Regime classification"
          git push origin HEAD:${{ github.head_ref }}
