name: Trusted Strategy Release Integrity

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-from-base:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout proposed files as untrusted data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: proposed
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: trusted/requirements.txt

      - name: Install trusted dependencies
        working-directory: trusted
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi

      - name: Validate proposed governance with trusted base code
        working-directory: trusted
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_SHA}"
          python strategy_release_integrity.py pr-gate \
            --base-ref "${BASE_SHA}" \
            --head-root ../proposed \
            --output output/strategy-release-integrity/trusted_pr_gate.json \
            2>&1 | tee /tmp/trusted-strategy-release-integrity.log

      - name: Inspect trusted safety boundary
        working-directory: trusted
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path('output/strategy-release-integrity/trusted_pr_gate.json').read_text(encoding='utf-8')
          )
          assert payload['passed'] is True
          assert payload['automatic_activation'] is False
          assert payload['automatic_merge'] is False
          assert payload['production_state_mutations'] == []
          PY
          git diff --exit-code

      - name: Upload trusted diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trusted-strategy-release-integrity-${{ github.run_id }}
          path: |
            trusted/output/strategy-release-integrity/trusted_pr_gate.json
            /tmp/trusted-strategy-release-integrity.log
          if-no-files-found: warn
          retention-days: 90
