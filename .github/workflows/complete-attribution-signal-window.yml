name: Complete Attribution Signal Window

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: complete-attribution-signal-window
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/portfolio-regime-attribution'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portfolio-regime-attribution
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Apply signal-window correction
        run: python .github/apply_attribution_signal_window.py
      - name: Validate corrected attribution
        run: |
          python -m py_compile \
            portfolio_regime_attribution.py .github/test_portfolio_regime_attribution.py
          python .github/test_portfolio_regime_attribution.py
      - name: Publish corrected module and test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio_regime_attribution.py .github/test_portfolio_regime_attribution.py
          git commit -m "Align attribution benchmark to signal window"
          git fetch origin feature/portfolio-regime-attribution
          git rebase origin/feature/portfolio-regime-attribution
          git push origin HEAD:feature/portfolio-regime-attribution
