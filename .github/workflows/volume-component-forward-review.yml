name: Volume Component Forward Review Packet

on:
  pull_request:
    branches:
      - main
    paths:
      - volume_component_forward_review.py
      - volume_component_forward_status.py
      - data/volume_component_forward_status.json
      - research/evidence_catalog.yaml
      - research_evidence_catalog.py
      - .github/test_volume_component_forward_review.py
      - .github/workflows/volume-component-forward-review.yml
  push:
    branches:
      - main
    paths:
      - volume_component_forward_review.py
      - volume_component_forward_status.py
      - data/volume_component_forward_status.json
      - research/evidence_catalog.yaml
      - research_evidence_catalog.py
      - .github/test_volume_component_forward_review.py
      - .github/workflows/volume-component-forward-review.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: volume-component-forward-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile review tools
        run: |
          python -m py_compile \
            volume_component_forward_status.py \
            research_evidence_catalog.py \
            volume_component_forward_review.py \
            .github/test_volume_component_forward_review.py
      - name: Validate manual review packet logic
        run: |
          set -o pipefail
          python .github/test_volume_component_forward_review.py \
            2>&1 | tee /tmp/volume-component-forward-review-test.log
      - name: Validate signed inputs
        run: |
          python volume_component_forward_status.py validate \
            --status data/volume_component_forward_status.json
          python research_evidence_catalog.py validate \
            --catalog research/evidence_catalog.yaml \
            --repository-root .
      - name: Build current review packet
        run: |
          set -o pipefail
          python volume_component_forward_review.py \
            --status data/volume_component_forward_status.json \
            --catalog research/evidence_catalog.yaml \
            --repository-root . \
            --output-dir output/volume-component-forward-review \
            | tee output/volume-component-forward-review/run.log
      - name: Validate packet boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('output/volume-component-forward-review')
          packet = json.loads(
              (root / 'volume_component_forward_review.json')
              .read_text(encoding='utf-8')
          )
          assert packet['status'] in {
              'NOT_READY',
              'READY_FOR_HUMAN_WEIGHT_REVIEW',
          }
          assert packet['current_weight_points'] == 15
          assert packet['current_governed_decision'] == (
              'HOLD_UNCHANGED_PENDING_FORWARD_EVIDENCE'
          )
          assert packet['automatic_weight_change'] is False
          assert packet['automatic_strategy_change'] is False
          assert packet['automatic_approval'] is False
          assert packet['manual_review_required'] is True
          assert packet['research_only'] is True
          assert packet['production_state_mutations'] == []
          assert len(packet['signed_status_sha256']) == 64
          assert len(packet['packet_sha256']) == 64
          assert set(row['horizon_days'] for row in packet['horizons']) == {10, 20}
          workbook = pd.ExcelFile(
              root / 'volume_component_forward_review.xlsx'
          )
          assert {
              'Review Summary',
              'Readiness Criteria',
              'Forward Horizons',
              'Evidence Chronology',
          }.issubset(workbook.sheet_names)
          PY
      - name: Validate read-only workflow policy
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path('.github/workflows/volume-component-forward-review.yml')
          text = path.read_text(encoding='utf-8')
          workflow = yaml.safe_load(text)
          assert workflow['permissions']['contents'] == 'read'
          assert ('git' + ' push') not in text
          assert ('contents:' + ' write') not in text
          assert ('EMAIL_' + 'APP_PASSWORD') not in text
          assert 'automatic_weight_change' in text
          assert 'automatic_approval' in text
          PY
      - name: Upload manual review packet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: volume-component-forward-review-${{ github.run_id }}
          path: |
            output/volume-component-forward-review/
            data/volume_component_forward_status.json
            research/evidence_catalog.yaml
          if-no-files-found: warn
          retention-days: 365
