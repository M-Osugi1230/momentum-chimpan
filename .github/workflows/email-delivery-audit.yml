name: Email Delivery Audit

on:
  workflow_run:
    workflows:
      - Daily Momentum Report
    types:
      - completed
  pull_request:
    branches:
      - main
    paths:
      - email_delivery.py
      - email_delivery_audit.py
      - daily_runner.py
      - research/operations/email_delivery_audit.csv
      - research/operations/email_delivery_audit_status.json
      - monthly_review_runner.py
      - .github/test_email_delivery.py
      - .github/workflows/email-delivery-audit.yml
      - .github/workflows/daily.yml
      - .github/workflows/monthly-operations-review.yml
      - docs/EMAIL_DELIVERY_AUDIT.md
      - docs/MONTHLY_REVIEW.md
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: daily-production-audit-main
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile email audit tools
        run: |
          python -m py_compile \
            email_delivery.py \
            email_delivery_audit.py \
            monthly_review_runner.py \
            daily_runner.py \
            .github/test_email_delivery.py
      - name: Validate receipt, audit, privacy, and monthly overlay
        run: |
          set -o pipefail
          python .github/test_email_delivery.py \
            2>&1 | tee /tmp/email-delivery-test.log
      - name: Validate committed email audit state
        run: |
          python email_delivery_audit.py validate \
            --history research/operations/email_delivery_audit.csv \
            --status research/operations/email_delivery_audit_status.json
      - name: Confirm read-only validation boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          text = Path('.github/workflows/email-delivery-audit.yml').read_text(encoding='utf-8')
          workflow = yaml.safe_load(text)
          assert workflow['permissions']['actions'] == 'read'
          assert workflow['permissions']['contents'] == 'read'
          assert ('EMAIL_' + 'APP_PASSWORD') not in text
          PY
      - name: Upload validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: email-delivery-validation-log
          path: /tmp/email-delivery-test.log
          if-no-files-found: ignore
          retention-days: 7

  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Download exact upstream daily artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: momentum-operations-*
          path: downloaded-daily-operations
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Append SMTP acceptance audit row
        env:
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_EVENT: ${{ github.event.workflow_run.event }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          SOURCE_UPDATED_AT: ${{ github.event.workflow_run.updated_at }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-daily-operations
          python email_delivery_audit.py update \
            --artifact-root downloaded-daily-operations \
            --workflow-run-id "${SOURCE_RUN_ID}" \
            --workflow-run-url "${SOURCE_RUN_URL}" \
            --upstream-conclusion "${SOURCE_CONCLUSION}" \
            --upstream-event "${SOURCE_EVENT}" \
            --head-sha "${SOURCE_HEAD_SHA}" \
            --created-at-utc "${SOURCE_CREATED_AT}" \
            --updated-at-utc "${SOURCE_UPDATED_AT}" \
            --history research/operations/email_delivery_audit.csv \
            --status research/operations/email_delivery_audit_status.json \
            | tee /tmp/email-delivery-audit-update.log
          python email_delivery_audit.py validate \
            --history research/operations/email_delivery_audit.csv \
            --status research/operations/email_delivery_audit_status.json
      - name: Persist email audit files only
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            research/operations/email_delivery_audit.csv \
            research/operations/email_delivery_audit_status.json
          if git diff --cached --quiet; then
            echo "No email audit changes to commit"
            exit 0
          fi
          git commit -m "Update SMTP acceptance audit"
          git fetch origin main
          git rebase origin/main
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Email audit push attempt ${attempt} failed"
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 10))
              git fetch origin main
              git rebase origin/main
            fi
          done
          echo "Failed to persist email delivery audit" >&2
          exit 1
      - name: Upload email audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-delivery-audit-${{ github.event.workflow_run.id }}
          path: |
            research/operations/email_delivery_audit.csv
            research/operations/email_delivery_audit_status.json
            /tmp/email-delivery-audit-update.log
          if-no-files-found: warn
          retention-days: 90
