name: Apply priority expectancy score

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/priority-expectancy-score'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate patch script
        run: python -m py_compile scripts/apply_priority_expectancy.py
      - name: Apply focused patch
        run: python scripts/apply_priority_expectancy.py
      - name: Install dependencies
        run: pip install -q -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Expectancy smoke test
        run: PYTHONPATH=. python scripts/test_priority_expectancy.py
      - name: Commit main.py when changed
        run: |
          if git diff --quiet -- main.py; then
            echo "main.py already updated"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py
          git commit -m "Add evidence-adjusted priority expectancy score"
          git push origin HEAD:${{ github.head_ref }}
