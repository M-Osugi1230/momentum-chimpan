name: Apply compact Top30 email patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/email-top30-compact'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply focused patch
        run: python scripts/apply_top30_compact.py
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Email smoke test
        run: |
          python - <<'PY'
          import pandas as pd
          from main import build_plain_email, build_html_email

          rows = []
          for rank in range(1, 36):
              rows.append({
                  'rank': rank,
                  'code': f'{1000 + rank}',
                  'name': f'Test{rank}',
                  'score': 100 - rank,
                  'close': 1000 + rank,
                  'return_5d': 0.20 - rank * 0.001,
                  'return_20d': 0.40 - rank * 0.003,
                  'return_60d': 0.60 - rank * 0.004,
                  'volume_ratio': 5.0 - rank * 0.05,
                  'trading_value': 10_000_000_000 - rank * 100_000_000,
                  'ytd_high_count': 20 - min(rank, 19),
                  'ytd_high_streak': max(1, 10 - rank // 4),
                  'score_ytd_high': 30,
                  'score_ytd_streak': 12,
                  'score_return_20d': 15,
                  'score_volume_ratio': 10,
                  'score_ma': 10,
                  'score_trading_value': 5,
                  'reason': '年初来高値更新、20日線上、60日線上、売買代金1億円以上',
                  'is_new_entry': False,
                  'is_rising_fast': False,
                  'is_best_rank': rank <= 5,
                  'rank_change': 0,
                  'top30_streak': 4 if rank <= 30 else 0,
                  'top30_streak_days': 4 if rank <= 30 else 0,
                  'price_date': '2026-07-10',
                  'ytd_high_flag': True,
                  'ma20_deviation': 0.10,
                  'above_ma20': True,
                  'above_ma60': True,
              })
          top100 = pd.DataFrame(rows)
          empty = top100.iloc[0:0].copy()
          temperature = pd.DataFrame([{
              'ytd_high_count': 100,
              'delta_ytd_high_count': 5,
              'top100_avg_score': 70.0,
              'delta_top100_avg_score': 1.0,
              'top100_avg_return_20d': 0.20,
              'delta_top100_avg_return_20d': 0.01,
              'top100_avg_volume_ratio': 2.0,
              'delta_top100_avg_volume_ratio': 0.1,
          }])
          summary = {
              '実行日': '2026-07-10',
              '新規ランクイン': 0,
              '急上昇': 0,
              'TOP30継続10日以上': 0,
              '年初来高値更新': 100,
              '取得失敗': 0,
          }
          cfg = {'ranking': {'email_top_n': 10}}
          plain = build_plain_email(summary, top100, empty, empty, top100.head(30), top100.head(10), temperature, cfg)
          html = build_html_email(summary, top100, empty, empty, top100.head(30), top100.head(10), temperature, cfg)
          assert 'Momentum Top10（詳細）' in plain
          assert 'Momentum 11-30（コンパクト）' in plain
          assert '#11 1011 Test11' in plain
          assert '#30 1030 Test30' in plain
          assert '#31 1031 Test31' not in plain
          assert 'Momentum 11-30（コンパクト）' in html
          assert '#30 1030 Test30' in html
          assert '#31 1031 Test31' not in html
          print('top30 compact email smoke ok')
          PY
      - name: Commit main.py when changed
        run: |
          if git diff --quiet -- main.py; then
            echo "main.py already updated"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py
          git commit -m "Add compact Momentum ranks 11 to 30"
          git push origin HEAD:${{ github.head_ref }}
