name: Complete Portfolio Filter Lab

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: complete-portfolio-filter-lab
  cancel-in-progress: true

jobs:
  complete:
    if: github.head_ref == 'feature/portfolio-filter-lab'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portfolio-filter-lab
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply portfolio eligibility calendar
        run: |
          python -m py_compile .github/apply_portfolio_filter_engine.py
          python .github/apply_portfolio_filter_engine.py

      - name: Run synthetic and governed-system validation
        run: |
          python -m py_compile \
            portfolio_research.py portfolio_filter_lab.py historical_backfill.py \
            relative_strength_lifecycle.py replay.py main.py strategy_governance.py \
            .github/test_portfolio_filter_lab.py .github/test_portfolio_research.py \
            .github/test_historical_relative_strength.py .github/validate_workflows.py
          python .github/test_portfolio_filter_lab.py
          python .github/test_portfolio_research.py
          python .github/test_historical_relative_strength.py
          python .github/validate_workflows.py
          python .github/test_walk_forward_replay.py
          python .github/test_strategy_governance.py
          python .github/test_evidence_provenance.py
          python .github/test_state_recovery.py

      - name: Confirm strategy fingerprint is unchanged
        run: |
          mkdir -p /tmp/strategy-base
          git show origin/main:main.py > /tmp/strategy-base/main.py
          git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/strategy-base/main.py \
            --base-config /tmp/strategy-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml

      - name: Build 36-symbol real-data filter comparison
        run: |
          mkdir -p /tmp/filter-pilot/replay /tmp/filter-pilot/filter_lab
          set -o pipefail
          python historical_backfill.py \
            --strict \
            --max-symbols 36 \
            --lookback-calendar-days 240 \
            --sample-every 10 \
            --batch-size 36 \
            --output-dir /tmp/filter-pilot | tee /tmp/filter-pilot/backfill.log
          python evidence_provenance.py seal-derived \
            --source-manifest /tmp/filter-pilot/backfill_manifest.json \
            --provenance /tmp/filter-pilot/replay/evidence_provenance.json
          python historical_price_panel.py \
            --strict \
            --history /tmp/filter-pilot/historical_ranking.csv \
            --backfill-manifest /tmp/filter-pilot/backfill_manifest.json \
            --output /tmp/filter-pilot/historical_price_panel.csv \
            --manifest /tmp/filter-pilot/historical_price_panel_manifest.json \
            --batch-size 36 | tee /tmp/filter-pilot/price-panel.log
          python replay.py \
            --strict \
            --history /tmp/filter-pilot/historical_ranking.csv \
            --jpx-cache data/jpx_list_cache.csv \
            --output-dir /tmp/filter-pilot/replay | tee /tmp/filter-pilot/replay.log
          python portfolio_filter_lab.py \
            --strict \
            --signals /tmp/filter-pilot/replay/replay_signals.csv \
            --history /tmp/filter-pilot/historical_ranking.csv \
            --prices /tmp/filter-pilot/historical_price_panel.csv \
            --provenance /tmp/filter-pilot/replay/evidence_provenance.json \
            --output-dir /tmp/filter-pilot/filter_lab | tee /tmp/filter-pilot/filter_lab/filter-lab.log

      - name: Validate real-data comparison artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          root = Path('/tmp/filter-pilot/filter_lab')
          metrics = pd.read_csv(root / 'portfolio_filter_metrics.csv')
          coverage = pd.read_csv(root / 'portfolio_filter_context_coverage.csv')
          manifest = json.loads((root / 'portfolio_filter_manifest.json').read_text(encoding='utf-8'))
          assert set(metrics['filter_rule']) == {
              'baseline', 'liquid_gap3', 'relative_strength_a_s', 'positive_lifecycle',
              'rs_a_s_positive_lifecycle', 'dual_outperformer', 'market_not_weak',
              'risk_on_rs_lifecycle', 'quality_liquid', 'action_ab_quality_liquid',
          }
          assert coverage.iloc[0]['relative_strength_score_coverage'] >= 0.99
          assert coverage.iloc[0]['lifecycle_coverage'] >= 0.99
          assert manifest['promotion_evidence_allowed'] is False
          assert manifest['automatic_filter_activation'] is False
          assert manifest['production_state_mutations'] == []
          assert (pd.to_numeric(metrics['eligible_signal_count'], errors='coerce') <= pd.to_numeric(metrics['total_signal_count'], errors='coerce')).all()
          allowed_statuses = {
              'BASELINE', 'OUTPERFORMED', 'POSITIVE_BUT_UNDERPERFORMED',
              'LOSS_REDUCED_ONLY', 'NOT_IMPROVED', 'NOT_EVALUATED',
          }
          assert set(metrics['improvement_status']).issubset(allowed_statuses)
          print(metrics[['filter_rule', 'eligible_signal_count', 'closed_trades', 'total_return', 'max_drawdown', 'excess_total_return', 'improvement_status']].to_string(index=False))
          PY

      - name: Upload filter comparison evidence
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-filter-lab-${{ github.run_id }}
          path: /tmp/filter-pilot/
          if-no-files-found: error
          retention-days: 30

      - name: Publish validated engine and evidence status updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio_research.py portfolio_filter_lab.py
          git commit -m "Refine portfolio filter evidence classification"
          git push origin HEAD:feature/portfolio-filter-lab
