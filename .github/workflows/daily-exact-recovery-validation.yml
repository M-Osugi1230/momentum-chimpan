name: Daily Exact Recovery Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - daily_recovery_drill.py
      - state_recovery.py
      - .github/test_daily_recovery_drill.py
      - .github/test_state_recovery.py
      - .github/workflows/daily.yml
      - .github/workflows/daily-exact-recovery-validation.yml
      - docs/DAILY_EXACT_RECOVERY.md
  push:
    branches:
      - main
    paths:
      - daily_recovery_drill.py
      - state_recovery.py
      - .github/test_daily_recovery_drill.py
      - .github/test_state_recovery.py
      - .github/workflows/daily.yml
      - .github/workflows/daily-exact-recovery-validation.yml
      - docs/DAILY_EXACT_RECOVERY.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile recovery tools
        run: |
          python -m py_compile \
            state_recovery.py \
            daily_recovery_drill.py \
            .github/test_state_recovery.py \
            .github/test_daily_recovery_drill.py
      - name: Validate sealed snapshot contract
        run: |
          set -o pipefail
          python .github/test_state_recovery.py \
            2>&1 | tee /tmp/state-recovery-test.log
      - name: Validate exact daily recovery gate
        run: |
          set -o pipefail
          python .github/test_daily_recovery_drill.py \
            2>&1 | tee /tmp/daily-exact-recovery-test.log
      - name: Validate read-only test boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path('.github/workflows/daily-exact-recovery-validation.yml')
          text = path.read_text(encoding='utf-8')
          workflow = yaml.safe_load(text)
          assert workflow['permissions']['contents'] == 'read'
          assert ('git' + ' push') not in text
          assert ('contents:' + ' write') not in text
          assert ('EMAIL_' + 'APP_PASSWORD') not in text
          PY
          git diff --exit-code
      - name: Upload validation failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-exact-recovery-validation-log
          path: |
            /tmp/state-recovery-test.log
            /tmp/daily-exact-recovery-test.log
          if-no-files-found: ignore
          retention-days: 7
