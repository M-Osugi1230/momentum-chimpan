name: Daily Production Audit

on:
  workflow_run:
    workflows:
      - Daily Momentum Report
    types:
      - completed
  pull_request:
    branches:
      - main
    paths:
      - operations_audit.py
      - research/operations/daily_production_audit.csv
      - research/operations/daily_production_audit_status.json
      - .github/test_operations_audit.py
      - .github/workflows/daily-operations-audit.yml
      - docs/ARCHITECTURE.md
      - docs/OPERATIONS_RUNBOOK.md
      - docs/DATA_DICTIONARY.md
      - docs/KPI_DICTIONARY.md
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: daily-production-audit-main
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Compile audit tools
        run: |
          python -m py_compile \
            operations_audit.py \
            .github/test_operations_audit.py
      - name: Validate audit ledger and workflow boundary
        run: |
          set -o pipefail
          python .github/test_operations_audit.py \
            2>&1 | tee /tmp/daily-production-audit-test.log
      - name: Validate committed audit state
        run: |
          python operations_audit.py validate \
            --history research/operations/daily_production_audit.csv \
            --status research/operations/daily_production_audit_status.json
      - name: Upload validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-production-audit-validation-log
          path: /tmp/daily-production-audit-test.log
          if-no-files-found: ignore
          retention-days: 7

  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.txt -c requirements.lock
          else
            python -m pip install -r requirements.txt
          fi
      - name: Prepare artifact directory
        run: mkdir -p downloaded-daily-operations
      - name: Download exact upstream daily artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: momentum-operations-*
          path: downloaded-daily-operations
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Append audit row and rebuild signed status
        env:
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_EVENT: ${{ github.event.workflow_run.event }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          SOURCE_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          SOURCE_UPDATED_AT: ${{ github.event.workflow_run.updated_at }}
        run: |
          set -euo pipefail
          python -m py_compile operations_audit.py
          python operations_audit.py update \
            --artifact-root downloaded-daily-operations \
            --workflow-run-id "${SOURCE_RUN_ID}" \
            --workflow-run-url "${SOURCE_RUN_URL}" \
            --upstream-conclusion "${SOURCE_CONCLUSION}" \
            --upstream-event "${SOURCE_EVENT}" \
            --head-sha "${SOURCE_HEAD_SHA}" \
            --head-branch "${SOURCE_HEAD_BRANCH}" \
            --created-at-utc "${SOURCE_CREATED_AT}" \
            --updated-at-utc "${SOURCE_UPDATED_AT}" \
            --history research/operations/daily_production_audit.csv \
            --status research/operations/daily_production_audit_status.json \
            | tee /tmp/daily-production-audit-update.log
          python operations_audit.py validate \
            --history research/operations/daily_production_audit.csv \
            --status research/operations/daily_production_audit_status.json
      - name: Persist audit files only
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            research/operations/daily_production_audit.csv \
            research/operations/daily_production_audit_status.json
          if git diff --cached --quiet; then
            echo "No audit changes to commit"
            exit 0
          fi
          git commit -m "Update daily production audit"
          git fetch origin main
          git rebase origin/main
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Audit push attempt ${attempt} failed"
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 10))
              git fetch origin main
              git rebase origin/main
            fi
          done
          echo "Failed to persist daily production audit" >&2
          exit 1
      - name: Upload audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-production-audit-${{ github.event.workflow_run.id }}
          path: |
            research/operations/daily_production_audit.csv
            research/operations/daily_production_audit_status.json
            /tmp/daily-production-audit-update.log
          if-no-files-found: warn
          retention-days: 90
