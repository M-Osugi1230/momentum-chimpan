name: Register Relative Strength Experiment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  register-and-validate:
    if: github.head_ref == 'feature/relative-strength-alpha'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/relative-strength-alpha
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Register exact strategy fingerprint
        run: python .github/register_relative_strength_experiment.py

      - name: Validate registry and strategy change
        run: |
          git fetch origin main
          mkdir -p /tmp/strategy-base
          git show origin/main:main.py > /tmp/strategy-base/main.py
          git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/strategy-base/main.py \
            --base-config /tmp/strategy-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml
          python strategy_governance.py audit \
            --registry research/experiment_registry.yaml \
            --output-dir /tmp/relative-strength-governance

      - name: Compile and focused validation
        run: |
          python -m py_compile main.py strategy_governance.py
          python - <<'PY'
          import yaml
          from pathlib import Path
          import strategy_governance

          registry = yaml.safe_load(Path('research/experiment_registry.yaml').read_text(encoding='utf-8'))
          experiments = {item['experiment_id']: item for item in registry['experiments']}
          experiment = experiments['relative-strength-alpha-v18']
          current = strategy_governance.strategy_fingerprint()['sha256']
          assert experiment['status'] == 'proposed'
          assert experiment['strategy_fingerprint'] == current
          assert experiment['manual_approval']['approved'] is False
          assert experiment['automatic_promotion'] is False
          assert registry['policy']['automatic_promotion'] is False
          print(current)
          PY

      - name: Remove temporary files
        run: |
          rm -f .github/register_relative_strength_experiment.py
          rm -f .github/workflows/register-relative-strength-experiment.yml
          rm -f .github/relative-strength-ci-trigger.txt
          git diff --check

      - name: Commit governed experiment registration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Register relative strength strategy experiment"
          git push origin HEAD:feature/relative-strength-alpha
