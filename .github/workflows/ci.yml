name: Validate Momentum Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: momentum-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile application and research tools
        run: >-
          python -m py_compile
          main.py replay.py research_scorecard.py robustness_analysis.py
          strategy_governance.py evidence_provenance.py operations.py state_recovery.py
          live_session_readiness.py live_session_eligibility.py forward_eligible_history.py
          priority_outcomes.py priority_outcome_ingest_only.py
          smoke_validate.py historical_backfill.py historical_price_panel.py
          live_execution_panel.py execution_realism.py relative_strength_lifecycle.py
          capacity_analysis.py portfolio_research.py portfolio_filter_lab.py portfolio_exit_lab.py
          volume_component_robustness.py volume_component_aggregate_guard.py
          volume_component_forward_evidence.py research_evidence_catalog.py
          .github/validate_workflows.py
          .github/test_walk_forward_replay.py .github/test_research_scorecard.py
          .github/test_robustness_analysis.py .github/test_strategy_governance.py
          .github/test_evidence_provenance.py .github/test_live_session_eligibility.py
          .github/test_forward_eligible_history.py .github/test_operations.py
          .github/test_historical_backfill.py .github/test_historical_relative_strength.py
          .github/test_execution_realism.py .github/test_live_execution_panel.py
          .github/test_execution_provenance.py .github/test_atomic_strategy_stamp.py
          .github/test_state_recovery.py .github/test_relative_strength_lifecycle.py
          .github/test_portfolio_research.py .github/test_portfolio_filter_lab.py
          .github/test_portfolio_exit_lab.py
          .github/test_volume_component_aggregate_guard.py
          .github/test_volume_component_forward_evidence.py
          .github/test_research_evidence_catalog.py
          .github/test_priority_outcome_ingest_only.py

      - name: Import and safety smoke test
        run: |
          python - <<'PY'
          import importlib.util
          import sys

          spec = importlib.util.spec_from_file_location("momentum_main", "main.py")
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          assert spec.loader is not None
          spec.loader.exec_module(module)

          assert module.EXECUTION_MODE == "RESEARCH_AND_PAPER_ONLY"
          assert module.APP_VERSION == "2026-07-11-dashboard-relative-strength-lifecycle-v19"

          fresh = module.pd.DataFrame({"price_date": ["2026-07-13"] * 100})
          stale = module.pd.DataFrame({"price_date": ["2026-07-10"] * 100})
          assert module.evaluate_market_data_freshness("2026-07-13", fresh)["state_update_allowed"] is True
          assert module.evaluate_market_data_freshness("2026-07-13", stale)["state_update_allowed"] is False
          print(module.APP_VERSION)
          PY

      - name: Validate workflow policies and governed evidence paths
        run: |
          set -o pipefail
          python .github/validate_workflows.py 2>&1 | tee /tmp/workflow-policy-test.log

      - name: Enforce strategy experiment registration
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          mkdir -p /tmp/strategy-base
          git show origin/main:main.py > /tmp/strategy-base/main.py
          git show origin/main:config.yaml > /tmp/strategy-base/config.yaml
          python strategy_governance.py ci-check \
            --base-main /tmp/strategy-base/main.py \
            --base-config /tmp/strategy-base/config.yaml \
            --current-main main.py \
            --current-config config.yaml \
            --registry research/experiment_registry.yaml

      - name: Validate reconciliation ingest-only path
        run: |
          set -o pipefail
          python .github/test_priority_outcome_ingest_only.py \
            2>&1 | tee /tmp/priority-outcome-ingest-only-test.log

      - name: Run walk-forward replay validation
        run: |
          set -o pipefail
          python .github/test_walk_forward_replay.py 2>&1 | tee /tmp/walk-forward-replay-test.log

      - name: Run benchmarked evidence validation
        run: |
          set -o pipefail
          python .github/test_research_scorecard.py 2>&1 | tee /tmp/research-scorecard-test.log

      - name: Run robustness analysis validation
        run: |
          set -o pipefail
          python .github/test_robustness_analysis.py 2>&1 | tee /tmp/robustness-analysis-test.log

      - name: Run strategy governance validation
        run: |
          set -o pipefail
          python .github/test_strategy_governance.py 2>&1 | tee /tmp/strategy-governance-test.log

      - name: Run evidence provenance validation
        run: |
          set -o pipefail
          python .github/test_evidence_provenance.py 2>&1 | tee /tmp/evidence-provenance-test.log
          python .github/test_live_session_eligibility.py 2>&1 | tee /tmp/live-session-eligibility-test.log
          python .github/test_forward_eligible_history.py 2>&1 | tee /tmp/forward-eligible-history-test.log

      - name: Run live execution panel validation
        run: |
          set -o pipefail
          python .github/test_live_execution_panel.py 2>&1 | tee /tmp/live-execution-panel-test.log

      - name: Run live execution provenance validation
        run: |
          set -o pipefail
          python .github/test_execution_provenance.py 2>&1 | tee /tmp/execution-provenance-test.log

      - name: Run atomic strategy stamp validation
        run: |
          set -o pipefail
          python .github/test_atomic_strategy_stamp.py 2>&1 | tee /tmp/atomic-strategy-stamp-test.log

      - name: Run sealed state recovery validation
        run: |
          set -o pipefail
          python .github/test_state_recovery.py 2>&1 | tee /tmp/state-recovery-test.log

      - name: Run relative strength lifecycle validation
        run: |
          set -o pipefail
          python .github/test_relative_strength_lifecycle.py 2>&1 | tee /tmp/relative-strength-lifecycle-test.log

      - name: Run historical relative strength validation
        run: |
          set -o pipefail
          python .github/test_historical_relative_strength.py 2>&1 | tee /tmp/historical-relative-strength-test.log

      - name: Run execution-aware portfolio research validation
        run: |
          set -o pipefail
          python .github/test_portfolio_research.py 2>&1 | tee /tmp/portfolio-research-test.log

      - name: Run portfolio filter lab validation
        run: |
          set -o pipefail
          python .github/test_portfolio_filter_lab.py 2>&1 | tee /tmp/portfolio-filter-lab-test.log

      - name: Run portfolio exit lab validation
        run: |
          set -o pipefail
          python .github/test_portfolio_exit_lab.py 2>&1 | tee /tmp/portfolio-exit-lab-test.log

      - name: Run complete-case volume aggregation validation
        run: |
          set -o pipefail
          python .github/test_volume_component_aggregate_guard.py 2>&1 | tee /tmp/volume-component-aggregate-guard-test.log

      - name: Run prospective volume component evidence validation
        run: |
          set -o pipefail
          python .github/test_volume_component_forward_evidence.py 2>&1 | tee /tmp/volume-component-forward-test.log

      - name: Run governed research evidence catalog validation
        run: |
          set -o pipefail
          python .github/test_research_evidence_catalog.py 2>&1 | tee /tmp/research-evidence-catalog-test.log

      - name: Run operational controls validation
        run: |
          set -o pipefail
          python .github/test_operations.py 2>&1 | tee /tmp/operations-test.log

      - name: Run historical backfill validation
        run: |
          set -o pipefail
          python .github/test_historical_backfill.py 2>&1 | tee /tmp/historical-backfill-test.log

      - name: Run execution realism validation
        run: |
          set -o pipefail
          python .github/test_execution_realism.py 2>&1 | tee /tmp/execution-realism-test.log

      - name: Upload validation failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: momentum-pipeline-validation-logs
          path: |
            /tmp/workflow-policy-test.log
            /tmp/priority-outcome-ingest-only-test.log
            /tmp/walk-forward-replay-test.log
            /tmp/research-scorecard-test.log
            /tmp/robustness-analysis-test.log
            /tmp/strategy-governance-test.log
            /tmp/evidence-provenance-test.log
            /tmp/live-session-eligibility-test.log
            /tmp/forward-eligible-history-test.log
            /tmp/live-execution-panel-test.log
            /tmp/execution-provenance-test.log
            /tmp/atomic-strategy-stamp-test.log
            /tmp/state-recovery-test.log
            /tmp/relative-strength-lifecycle-test.log
            /tmp/historical-relative-strength-test.log
            /tmp/portfolio-research-test.log
            /tmp/portfolio-filter-lab-test.log
            /tmp/portfolio-exit-lab-test.log
            /tmp/volume-component-aggregate-guard-test.log
            /tmp/volume-component-forward-test.log
            /tmp/research-evidence-catalog-test.log
            /tmp/operations-test.log
            /tmp/historical-backfill-test.log
            /tmp/execution-realism-test.log
          if-no-files-found: ignore
          retention-days: 7
