name: Validate Momentum Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: momentum-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile application and operational tools
        run: >-
          python -m py_compile
          main.py replay.py operations.py
          .github/test_walk_forward_replay.py .github/test_operations.py

      - name: Import and safety smoke test
        run: |
          python - <<'PY'
          import importlib.util
          import sys

          spec = importlib.util.spec_from_file_location("momentum_main", "main.py")
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          assert spec.loader is not None
          spec.loader.exec_module(module)

          assert module.EXECUTION_MODE == "RESEARCH_AND_PAPER_ONLY"
          assert module.APP_VERSION == "2026-07-11-dashboard-market-freshness-v17"

          fresh = module.pd.DataFrame({"price_date": ["2026-07-13"] * 100})
          stale = module.pd.DataFrame({"price_date": ["2026-07-10"] * 100})
          assert module.evaluate_market_data_freshness("2026-07-13", fresh)["state_update_allowed"] is True
          assert module.evaluate_market_data_freshness("2026-07-13", stale)["state_update_allowed"] is False
          print(module.APP_VERSION)
          PY

      - name: Validate workflow syntax and durable state coverage
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          daily_path = Path(".github/workflows/daily.yml")
          daily_text = daily_path.read_text(encoding="utf-8")
          assert isinstance(yaml.safe_load(daily_text), dict)

          required_fragments = [
              "python-version: '3.12'",
              "daily-momentum-report-main",
              "retention-days: 90",
              "data/momentum_daily_ranking.csv",
              "data/market_temperature.csv",
              "data/sector_leader_signal_history.csv",
              "data/paper_portfolio.csv",
              "data/paper_trade_history.csv",
              "data/paper_equity_history.csv",
              "data/execution_audit.csv",
              "data/operations_heartbeat.json",
              "data/state_snapshots",
              "operations.py heartbeat",
              "operations.py maintain",
              "operations.py notify",
              "output/state_maintenance.json",
              "output/ops_notification.txt",
              "steps.maintenance.outcome == 'success'",
              "git rebase origin/main",
          ]
          missing = [fragment for fragment in required_fragments if fragment not in daily_text]
          assert not missing, f"daily workflow missing operational controls: {missing}"

          source = Path("main.py").read_text(encoding="utf-8")
          freshness_fragments = [
              "def evaluate_market_data_freshness(",
              "def attach_market_data_freshness_health(",
              "if state_update_allowed:\n        write_ranking_history",
              "paper_result = load_existing_paper_state(regime, run_health)",
              "state_snapshots = pd.DataFrame(columns=STATE_SNAPSHOT_COLUMNS)",
              '"状態更新実行": "YES" if state_update_allowed else "NO"',
          ]
          missing_freshness = [fragment for fragment in freshness_fragments if fragment not in source]
          assert not missing_freshness, f"market freshness guard regression: {missing_freshness}"

          replay_text = Path(".github/workflows/replay.yml").read_text(encoding="utf-8")
          assert isinstance(yaml.safe_load(replay_text), dict)
          replay_fragments = [
              "python replay.py",
              "--strict",
              "retention-days: 90",
              "contents: read",
              "output/replay/",
          ]
          missing_replay = [fragment for fragment in replay_fragments if fragment not in replay_text]
          assert not missing_replay, f"replay workflow regression: {missing_replay}"
          PY

      - name: Run walk-forward replay validation
        run: |
          set -o pipefail
          python .github/test_walk_forward_replay.py 2>&1 | tee /tmp/walk-forward-replay-test.log

      - name: Run operational controls validation
        run: |
          set -o pipefail
          python .github/test_operations.py 2>&1 | tee /tmp/operations-test.log

      - name: Upload validation failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: momentum-validation-test-logs
          path: |
            /tmp/walk-forward-replay-test.log
            /tmp/operations-test.log
          retention-days: 1
