name: Apply priority candidate patch

on:
  push:
    branches:
      - feature/daily-priority-candidates
    paths:
      - .github/workflows/apply-priority-candidates.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/daily-priority-candidates
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply focused patch
        run: python scripts/apply_priority_candidates.py
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Commit main.py
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py
          git commit -m "Add daily priority candidate section"
          git push origin HEAD:feature/daily-priority-candidates
