name: Repair Score Component Ablation

on:
  pull_request:
    branches:
      - main
    paths:
      - score_component_ablation.py
      - .github/test_score_component_ablation.py
      - .github/workflows/score-component-ablation.yml
      - .github/workflows/repair-score-component-ablation.yml

permissions:
  contents: write

concurrency:
  group: repair-score-component-ablation
  cancel-in-progress: true

jobs:
  repair:
    if: github.head_ref == 'feature/score-component-ablation'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/score-component-ablation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Remove implicit scipy dependency
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('score_component_ablation.py')
          text = path.read_text(encoding='utf-8')
          old = '        corr = group["rank_baseline"].corr(group["rank_variant"], method="spearman")\n'
          new = (
              '        baseline_ranks = pd.to_numeric(group["rank_baseline"], errors="coerce").rank(method="average")\n'
              '        variant_ranks = pd.to_numeric(group["rank_variant"], errors="coerce").rank(method="average")\n'
              '        corr = baseline_ranks.corr(variant_ranks, method="pearson")\n'
          )
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          elif new not in text:
              raise SystemExit('expected rank correlation anchor not found')
          PY

      - name: Validate repaired ablation
        run: |
          python -m py_compile score_component_ablation.py .github/test_score_component_ablation.py
          python .github/test_score_component_ablation.py

      - name: Commit repaired implementation
        run: |
          if git diff --quiet -- score_component_ablation.py; then
            echo 'No repair commit required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add score_component_ablation.py
          git commit -m 'Remove scipy dependency from rank diagnostics'
          git push origin HEAD:feature/score-component-ablation
