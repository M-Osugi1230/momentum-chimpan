study:
  id: volume-component-forward-evidence-v1
  registered_at: '2026-07-12'
  eligible_signal_date_from: '2026-07-13'
  source_pr: 61
  hypothesis: The governed volume-ratio score component improves next-session executable forward outcomes versus a distribution-preserving removal counterfactual.

comparison:
  baseline_variant: baseline
  tested_variant: drop_volume_ratio
  preserved_daily_score_distribution: true
  entry_model: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
  same_day_close_entry_allowed: false
  horizons: [5, 10, 20]
  entry_slippage_bps: 5
  exit_slippage_bps: 5
  fees_bps: 20

evidence_gate:
  primary_target: excess_vs_universe
  required_horizons: [10, 20]
  minimum_outcomes_per_variant_per_horizon: 100
  minimum_paired_dates_per_horizon: 20
  maximum_two_sided_p_value: 0.05
  require_ci_high_below_zero: true
  require_early_and_late_negative: true

operations:
  raw_evidence_persistence: ACTIONS_ARTIFACT_ONLY
  signed_status_path: data/volume_component_forward_status.json
  publisher_workflow: Publish Volume Component Forward Status
  status_commit_policy: SEMANTIC_EVIDENCE_CHANGE_ONLY
  status_commit_retriggers_forward_analysis: false

governance:
  research_only: true
  promotion_evidence_allowed: false
  automatic_weight_change: false
  automatic_strategy_change: false
  manual_review_required: true
  production_state_mutation_allowed: false
  execution_mode: RESEARCH_AND_PAPER_ONLY
