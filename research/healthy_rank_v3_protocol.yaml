version: 2026-07-22-healthy-rank-v3-holdout-v1
mode: RESEARCH_ONLY_NON_PROMOTABLE
promotion_evidence_allowed: false
automatic_strategy_change: false
automatic_threshold_optimization: false
production_ranking_change: false
healthy_v1_eligibility_change: false

candidate:
  id: healthy-rank-v3-equal-weight-reorder
  eligibility: HEALTHY_V1_ELIGIBLE_ONLY
  score_scale: 100
  components:
    return_5d_cross_section_percentile: 0.25
    return_20d_cross_section_percentile: 0.25
    healthy_relative_strength_cross_section_percentile: 0.25
    ma20_deviation_middle_preference: 0.25
  ma20_deviation_middle_preference:
    peak: 0.04
    zero_distance: 0.16
    formula: MAX_0_1_MINUS_ABS_DEVIATION_MINUS_PEAK_DIVIDED_BY_ZERO_DISTANCE
  missing_component_policy: INELIGIBLE_FOR_V3_RANK
  tie_break: CODE_ASCENDING
  tuning_after_holdout_result: FORBIDDEN

holdout:
  evaluation_start: '2018-01-01'
  evaluation_end: '2021-12-31'
  download_start: '2016-10-01'
  download_end: '2022-04-30'
  relationship_to_design: UNTOUCHED_HISTORICAL_HOLDOUT
  universe: DETERMINISTIC_SECTOR_BALANCED_CURRENT_LIST_SAMPLE_1500
  ranking_frequency: EVERY_5_TRADING_SESSIONS
  freshness_policy: DETAILED_OOS_V2_STRICT

evaluation:
  horizons: [1, 3, 5, 10, 20, 40, 60]
  primary_horizons: [5, 10, 20]
  top_sizes: [10, 30, 100]
  primary_top_sizes: [10, 30]
  round_trip_cost_bps: 20
  cost_robustness_bps: [20, 50, 100]
  random_placebo_repetitions: 500
  entry_model: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
  exit_model: ADJUSTED_CLOSE_AT_FIXED_SESSION
  primary_benchmark: HEALTHY_V1
  reference_benchmark: PRODUCTION

primary_hypotheses:
  - id: H1
    statement: Healthy Rank v3 improves Healthy v1 within the unchanged Healthy v1 eligible set.
  - id: H2
    statement: Healthy Rank v3 produces stronger and more monotonic rank ordering than Healthy v1.
  - id: H3
    statement: Improvement survives outlier trimming, higher costs, random placebo, and leave-one-sector-out.
  - id: H4
    statement: Any positive historical result remains non-promotable until live forward confirmation.

evidence_gates:
  minimum_years_outperforming_healthy_v1: 3
  minimum_years_trimmed_outperforming_healthy_v1: 3
  minimum_daily_outperformance_rate: 0.52
  minimum_rank_ic_positive_rate: 0.55
  minimum_leave_one_sector_positive_delta_rate: 0.80
  minimum_years_positive_after_50bps: 3
  minimum_years_random_placebo_p_le_0_10: 2
  live_forward_confirmation_required: true

known_limitations:
  - CURRENT_LIST_SURVIVORSHIP_AND_MEMBERSHIP_BIAS
  - YFINANCE_ADJUSTED_PRICE_DEPENDENCY
  - CURRENT_METADATA_MAY_DIFFER_FROM_HISTORICAL_METADATA
  - SAMPLE_CROSS_SECTION_MEDIAN_IS_NOT_TOPIX
  - FIVE_SESSION_SNAPSHOT_FREQUENCY
  - HISTORICAL_HOLDOUT_IS_NOT_PROMOTION_EVIDENCE
