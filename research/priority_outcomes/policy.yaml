policy:
  id: daily-research-priority-outcomes-v1
  registered_at: '2026-07-12'
  purpose: Prospectively evaluate whether A/B/C/Watch/Skip research priorities improve subsequent research outcomes.

source:
  workflow: Daily Momentum Report
  artifact_pattern: momentum-operations-*
  workbook_sheet: Action Priority
  require_full_state_update: true
  require_strategy_fingerprint: true
  eligible_decision_date_from: '2026-07-13'

storage:
  decision_history: research/priority_outcomes/daily_research_decisions.csv
  outcome_history: research/priority_outcomes/daily_research_outcomes.csv
  calibration_json: research/priority_outcomes/latest_calibration.json
  calibration_markdown: research/priority_outcomes/latest_calibration.md
  decision_natural_key:
    - decision_date
    - code
    - strategy_fingerprint
    - focus_policy_version
  outcome_natural_key:
    - decision_id
    - horizon_sessions

execution_model:
  entry: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
  same_day_close_entry_allowed: false
  horizons_sessions: [5, 10, 20]
  entry_session_counts_as_session_one: true
  exit: ADJUSTED_CLOSE
  round_trip_cost_bps: 20
  price_source: yfinance
  market_benchmark_ticker: ^TOPX
  sector_proxy: SAME_DECISION_DATE_SECTOR_COHORT_MEDIAN_NET_RETURN
  minimum_sector_peer_count: 3

calibration:
  dimensions:
    - research_bucket
    - lifecycle_status
    - market_regime
    - sector33
    - data_quality_grade
    - momentum_rank_bucket
    - momentum_score_bucket
  statistics:
    - sample_size
    - mean_net_return
    - mean_market_excess_return
    - median_market_excess_return
    - positive_market_excess_rate
    - bootstrap_95_percent_confidence_interval
  bootstrap_iterations: 2000
  small_sample_warning_below: 30
  human_review_minimum_per_required_bucket_horizon: 30
  human_review_minimum_distinct_decision_dates: 20
  required_buckets_for_review: [A, B]
  required_horizons_for_review: [5, 10, 20]

governance:
  prospective_only: true
  no_lookahead_required: true
  automatic_score_change: false
  automatic_weight_change: false
  automatic_strategy_change: false
  automatic_priority_rule_change: false
  production_state_mutations: []
  live_orders: false
  manual_review_required: true
