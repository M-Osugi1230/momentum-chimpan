schema_version: 2
policy_id: healthy-momentum-v2-balanced-shadow
mode: SHADOW_ONLY
research_only: true
automatic_promotion: false
automatic_production_ranking_change: false
automatic_paper_change: false

base_policy: research/healthy_momentum_policy.yaml
v1_is_only_eligibility_gate: true

confirmation_cautions:
  min_recent_pace_ratio: 0.05
  max_recent_pace_ratio: 1.20
  max_market_relative_5d_percentile: 0.90
  max_sector_relative_5d_percentile: 0.90
  max_long_relative_strength_score: 90
  min_rank_change: -20
  min_current_day_return: -0.015
  max_current_day_return: 0.03
  min_drawdown_from_recent_high: -0.08

confirmation_components:
  recent_pace_ratio:
    weight: 20
    low: 0.05
    peak: 0.35
    high: 1.20
  market_relative_5d_percentile:
    weight: 15
    low: 0.0
    peak: 0.35
    high: 0.90
  sector_relative_5d_percentile:
    weight: 15
    low: 0.0
    peak: 0.40
    high: 0.90
  current_day_return:
    weight: 15
    low: -0.03
    peak: 0.005
    high: 0.03
  drawdown_from_recent_high:
    weight: 10
    low: -0.10
    peak: -0.03
    high: 0.01
  long_relative_strength:
    weight: 25
    low: 30
    peak: 55
    high: 90

selection_score:
  healthy_v1_weight: 0.85
  confirmation_weight: 0.15

shadow_backtest:
  top_sizes: [10, 30, 100]
  horizons: [1, 3, 5]
  minimum_unique_report_dates: 6
  historical_results_are_promotion_evidence: false
  compare_methods:
    - production
    - healthy_v1
    - healthy_v2
  preserve_failed_candidates: true
  reason: Historical report-close replay is diagnostic only. V2 may not replace v1 or production without live forward evidence and explicit manual approval.

promotion_policy:
  minimum_live_forward_outcomes: 100
  minimum_live_report_dates: 20
  required_horizon: 5
  required_execution_model: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
  required_evidence_origin: LIVE_FORWARD_RANKING_HISTORY
  minimum_mean_excess_improvement_vs_production: 0.005
  minimum_mean_excess_improvement_vs_v1: 0.002
  minimum_outperformance_rate_vs_production: 0.55
  minimum_outperformance_rate_vs_v1: 0.52
  require_positive_early_period: true
  require_positive_late_period: true
  require_positive_leave_one_sector: true
  require_manual_approval: true
