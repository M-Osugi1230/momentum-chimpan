schema_version: 1
policy_id: healthy-momentum-v1-shadow
mode: SHADOW_ONLY
research_only: true
automatic_promotion: false
automatic_production_ranking_change: false
automatic_paper_change: false

eligibility:
  min_trading_value: 100000000
  require_above_ma20: true
  require_above_ma60: true
  min_return_5d: 0.0
  min_return_20d: 0.03
  max_return_20d: 0.20
  min_ma20_deviation: 0.0
  max_ma20_deviation: 0.10
  min_volume_ratio: 0.8
  max_volume_ratio: 5.0
  min_current_day_return: -0.03
  min_drawdown_from_recent_high: -0.10
  exclude_corporate_action_suspected: true
  exclude_abnormal_price: true

healthy_quality_components:
  return_20d:
    weight: 20
    low: 0.03
    peak: 0.10
    high: 0.20
  return_5d:
    weight: 12
    low: 0.0
    peak: 0.04
    high: 0.12
  return_60d:
    weight: 8
    low: 0.0
    peak: 0.15
    high: 0.50
  ma20_deviation:
    weight: 15
    low: 0.0
    peak: 0.04
    high: 0.10
  ma60_deviation:
    weight: 5
    low: 0.0
    peak: 0.08
    high: 0.25
  volume_ratio:
    weight: 10
    low: 0.8
    peak: 1.5
    high: 4.0
  current_day_return:
    weight: 8
    low: -0.01
    peak: 0.01
    high: 0.05
  drawdown_from_recent_high:
    weight: 7
    low: -0.10
    peak: -0.03
    high: 0.01
  relative_strength:
    weight: 15

selection_score:
  healthy_quality_weight: 0.75
  existing_momentum_weight: 0.25

shadow_backtest:
  top_sizes: [10, 30, 100]
  horizons: [1, 3, 5]
  minimum_unique_report_dates: 6
  historical_results_are_promotion_evidence: false
  reason: Historical replay is diagnostic only; production promotion requires live forward outcomes and explicit manual approval.

promotion_policy:
  minimum_live_forward_outcomes: 100
  minimum_live_report_dates: 20
  required_horizon: 5
  minimum_mean_excess_improvement: 0.005
  minimum_outperformance_rate: 0.55
  require_positive_early_period: true
  require_positive_late_period: true
  require_positive_leave_one_sector: true
  require_manual_approval: true
