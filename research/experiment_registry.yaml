schema_version: 1
policy:
  execution_mode: RESEARCH_AND_PAPER_ONLY
  automatic_promotion: false
  minimum_outcome_count: 100
  required_robustness_status: ROBUST
  maximum_fdr_q_value: 0.05
  require_positive_early_period: true
  require_positive_late_period: true
  require_positive_leave_one_sector: true
  require_manual_approval: true
  allowed_promotion_evidence_origins:
  - LIVE_FORWARD_RANKING_HISTORY
  required_promotion_execution_model: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
experiments:
- experiment_id: production-baseline-v17
  experiment_type: baseline
  status: production
  hypothesis: Current production research rules before governed experiments.
  strategy_fingerprint: CURRENT
  change_summary: Baseline only; no automatic promotion or threshold changes.
  evidence_scope:
    group_type: overall
    group_value: all
    horizon_days: 10
  manual_approval:
    approved: true
    approved_by: repository-owner
    approved_at: '2026-07-11'
  notes: The exact current fingerprint is emitted into daily and weekly audit artifacts.
- experiment_id: relative-strength-alpha-v18
  experiment_type: relative-strength-feature
  status: proposed
  hypothesis: Stocks outperforming both the scanned market median and their JPX 33-sector
    median over 20 and 60 trading days will produce stronger 10-day forward excess
    returns than otherwise similar momentum leaders.
  strategy_fingerprint: c5397894cc4a67a1f5efe1131a990f0d3508f28dc15f23dc0e50671e6f5de05c
  change_summary: Add market-relative and sector-relative 20/60-day strength, include
    a bounded relative-strength contribution in sector-leader scoring, and evaluate
    forward returns against same-window market and sector medians. Base Momentum scoring
    is unchanged.
  evidence_scope:
    group_type: overall
    group_value: all
    horizon_days: 10
  success_criteria:
    minimum_outcome_count: 100
    positive_market_excess_return: true
    positive_sector_excess_return: true
    minimum_market_outperformance_rate: 0.55
    minimum_sector_outperformance_rate: 0.55
    required_robustness_status: ROBUST
    maximum_fdr_q_value: 0.05
  manual_approval:
    approved: false
    approved_by: ''
    approved_at: ''
  automatic_promotion: false
  notes: Research and paper validation only. Registration permits governed measurement
    but does not authorize automatic threshold changes, promotion, or live order execution.
- experiment_id: healthy-momentum-v1-shadow
  experiment_type: ranking-selection-shadow
  status: running
  hypothesis: A two-stage ranking that first excludes falling, structurally broken,
    illiquid, overheated, and data-risk stocks, then ranks moderate upward momentum,
    will improve 5-report forward outcomes versus the current production Momentum rank.
  strategy_fingerprint: healthy-momentum-v1-shadow-module-2026-07-21
  change_summary: Add a read-only Healthy Momentum shadow rank. Eligibility requires
    positive 5-day momentum, moderate 20-day momentum, price above 20/60-day averages,
    bounded MA20 deviation and volume, limited current-day decline and drawdown, and
    adequate liquidity. Rank score blends 75% bounded healthy quality with 25% current
    Momentum score. Production rank and paper execution remain unchanged.
  evidence_scope:
    group_type: overall
    group_value: all
    horizon_days: 5
  success_criteria:
    minimum_outcome_count: 100
    minimum_live_report_dates: 20
    minimum_mean_excess_improvement: 0.005
    minimum_outperformance_rate: 0.55
    required_robustness_status: ROBUST
    maximum_fdr_q_value: 0.05
    positive_early_period: true
    positive_late_period: true
    positive_leave_one_sector: true
    evidence_origin: LIVE_FORWARD_RANKING_HISTORY
    execution_model: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
  manual_approval:
    approved: false
    approved_by: ''
    approved_at: ''
  automatic_promotion: false
  notes: Historical report-close replay is diagnostic only and cannot promote this
    experiment. The shadow workflow is read-only. A separate reviewed release is required
    before production rank, Daily Action List, or paper execution may consume this score.
- experiment_id: healthy-momentum-v2-hard-confirmation
  experiment_type: ranking-confirmation-shadow
  status: rejected
  hypothesis: Requiring every v1 candidate to pass continuing 60-day trend, pace,
    relative-strength, rank-direction, current-day, and recent-high gates will improve
    outcomes by removing stale momentum.
  strategy_fingerprint: healthy-momentum-v2-hard-confirmation-rejected-2026-07-21
  change_summary: Tested a hard confirmation gate and a 60% v1 plus 40% confirmation
    score. The candidate reduced the latest eligible universe from 308 to 117 and was
    rejected after underperforming v1 in all nine Top10/30/100 by 1/3/5-report comparisons.
  evidence_scope:
    group_type: overall
    group_value: all
    horizon_days: 5
  manual_approval:
    approved: false
    approved_by: ''
    approved_at: ''
  automatic_promotion: false
  notes: Diagnostic report-close history only. Top30 three-report mean changed from
    positive 0.2843 percent for v1 to negative 0.0192 percent. The failed result is retained
    to prevent silent threshold reuse or automatic retry.
- experiment_id: healthy-momentum-v2-balanced-shadow
  experiment_type: ranking-confirmation-shadow
  status: running
  hypothesis: A small bounded overlay that prefers balanced continuation and penalizes
    crowded short-term and long-term extremes, while keeping all v1-eligible stocks
    rankable, will improve 5-report outcomes without the selection damage caused by hard
    confirmation gates.
  strategy_fingerprint: healthy-momentum-v2-balanced-shadow-module-2026-07-21
  change_summary: Keep Healthy Momentum v1 as the only eligibility gate. Score recent pace,
    report-local 5-day market and sector relative percentiles, current-day return, distance
    from the recent high, and long relative strength with middle-peaked bounded functions.
    Blend 85% v1 selection score with 15% balanced confirmation. Rank change is diagnostic
    only. Production, v1, Daily Action List, and paper execution remain unchanged.
  evidence_scope:
    group_type: overall
    group_value: all
    horizon_days: 5
  success_criteria:
    minimum_outcome_count: 100
    minimum_live_report_dates: 20
    minimum_mean_excess_improvement_vs_production: 0.005
    minimum_mean_excess_improvement_vs_v1: 0.002
    minimum_outperformance_rate_vs_production: 0.55
    minimum_outperformance_rate_vs_v1: 0.52
    required_robustness_status: ROBUST
    maximum_fdr_q_value: 0.05
    positive_early_period: true
    positive_late_period: true
    positive_leave_one_sector: true
    evidence_origin: LIVE_FORWARD_RANKING_HISTORY
    execution_model: NEXT_AVAILABLE_SESSION_ADJUSTED_OPEN
  manual_approval:
    approved: false
    approved_by: ''
    approved_at: ''
  automatic_promotion: false
  notes: Historical report-close replay remains diagnostic only. A separate reviewed
    release and explicit approval are required before any production or paper consumer may
    use the balanced score.
